<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiMo v2.5 Pro</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --bg-2: #161625;
            --bg-3: #1c1c30;
            --surface: #1a1a2e;
            --surface-2: #22223a;
            --border: #2d2d4a;
            --border-light: #3a3a5c;
            --text: #eaeaf0;
            --text-2: #a0a0c0;
            --text-3: #6a6a8a;
            --accent: #7c6af0;
            --accent-2: #9d8df7;
            --accent-glow: rgba(124,106,240,0.25);
            --green: #4ade80;
            --red: #f87171;
            --yellow: #fbbf24;
            --blue: #60a5fa;
            --radius: 16px;
            --radius-sm: 10px;
            --radius-xs: 6px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .app { display:flex; height:100%; }

        .sidebar {
            width: 260px;
            background: var(--bg-2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 50;
        }
        .sb-head { padding: 16px; border-bottom: 1px solid var(--border); }
        .logo { display: flex; align-items: center; gap: 10px; }
        .logo-img {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, #7c6af0, #60a5fa);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
        }
        .logo-title {
            font-size: 15px; font-weight: 700;
            background: linear-gradient(90deg, #9d8df7, #60a5fa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .logo-sub { font-size: 10px; color: var(--text-3); }
        .btn-new {
            width: 100%; margin-top: 12px; padding: 10px;
            background: linear-gradient(135deg, #7c6af0, #6a5acd);
            border: none; border-radius: var(--radius-sm);
            color: #fff; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: .2s;
        }
        .btn-new:hover { opacity:.85; }
        .sb-list { flex: 1; overflow-y: auto; padding: 8px; }
        .sb-list::-webkit-scrollbar { width:4px; }
        .sb-list::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
        .chat-item {
            padding: 10px 12px; border-radius: var(--radius-sm);
            cursor: pointer; display: flex; align-items: center; gap: 8px;
            font-size: 13px; color: var(--text-2); transition: .15s; margin-bottom: 2px;
        }
        .chat-item:hover { background:var(--bg-3); color:var(--text); }
        .chat-item.active { background:var(--accent-glow); color:var(--accent-2); }
        .chat-item .ci-text { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .chat-item .ci-del {
            opacity:0; background:none; border:none; color:var(--red);
            cursor:pointer; font-size:14px; padding:2px 4px;
        }
        .chat-item:hover .ci-del { opacity:1; }
        .sb-foot { padding: 12px; border-top: 1px solid var(--border); }
        .sb-foot .status {
            display: flex; align-items: center; gap: 6px;
            font-size: 11px; color: var(--text-3);
        }
        .dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: var(--green); animation: blink 2s infinite;
        }
        .dot.off { background: var(--red); animation:none; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

        .main { flex:1; display:flex; flex-direction:column; min-width:0; }

        .head {
            height: 52px; padding: 0 16px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--border); background: var(--bg-2); flex-shrink: 0;
        }
        .head-left { display:flex; align-items:center; gap:10px; }
        .btn-menu {
            display:none; background:none; border:none;
            color:var(--text); font-size:20px; cursor:pointer; padding:4px;
        }
        .badge {
            padding: 4px 12px; background: var(--bg-3);
            border: 1px solid var(--border); border-radius: 20px;
            font-size: 12px; color: var(--accent-2);
        }
        .head-right { display:flex; gap:4px; }
        .head-btn {
            background:none; border:none; color:var(--text-3);
            font-size:16px; cursor:pointer; padding:6px; border-radius:6px; transition:.15s;
        }
        .head-btn:hover { background:var(--bg-3); color:var(--text); }

        .chat { flex:1; overflow-y:auto; padding: 16px; scroll-behavior:smooth; }
        .chat::-webkit-scrollbar { width:5px; }
        .chat::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

        .welcome {
            display:flex; flex-direction:column; align-items:center;
            justify-content:center; height:100%; text-align:center; padding:24px;
        }
        .welcome-icon { font-size:56px; margin-bottom:16px; }
        .welcome h2 {
            font-size:24px; font-weight:700; margin-bottom:6px;
            background: linear-gradient(90deg, #9d8df7, #60a5fa);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
        }
        .welcome p { color:var(--text-3); font-size:14px; margin-bottom:28px; }
        .quick-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; max-width:400px; width:100%; }
        .quick-card {
            padding:14px; background:var(--surface);
            border:1px solid var(--border); border-radius:var(--radius-sm);
            cursor:pointer; text-align:left; transition:.2s;
        }
        .quick-card:hover {
            border-color:var(--accent); background:var(--accent-glow); transform:translateY(-2px);
        }
        .quick-card .qi { font-size:20px; margin-bottom:6px; }
        .quick-card .qt { font-size:12px; color:var(--text-2); }

        .msg {
            display:flex; gap:10px; margin-bottom:20px;
            max-width:720px; margin-left:auto; margin-right:auto;
            animation: msgIn .25s ease;
        }
        @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
        .msg.user { flex-direction:row-reverse; }
        .msg-av {
            width:32px; height:32px; border-radius:8px;
            display:flex; align-items:center; justify-content:center;
            font-size:16px; flex-shrink:0;
        }
        .msg.user .msg-av { background:linear-gradient(135deg,#7c6af0,#6a5acd); }
        .msg.ai .msg-av { background:var(--bg-3); border:1px solid var(--border); }
        .msg-body { max-width:78%; min-width:50px; }
        .bubble {
            padding: 12px 16px; border-radius: var(--radius);
            font-size: 14px; line-height: 1.7; word-break: break-word;
        }
        .msg.user .bubble {
            background: linear-gradient(135deg,#7c6af0,#6a5acd);
            color:#fff; border-bottom-right-radius: 4px;
        }
        .msg.ai .bubble {
            background: var(--surface); border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }
        .msg-time { font-size:10px; color:var(--text-3); margin-top:4px; padding:0 4px; }
        .msg.user .msg-time { text-align:right; }

        .bubble pre {
            background: #0a0a16; border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 12px;
            overflow-x: auto; margin: 8px 0; position: relative;
        }
        .bubble code {
            font-family: 'SF Mono','Fira Code','Cascadia Code',monospace;
            font-size: 12px; line-height: 1.5;
        }
        .bubble pre code { color:#e8e8f0; }
        .bubble p code {
            background:var(--bg-3); padding:1px 5px; border-radius:3px;
            font-size:12px; color:var(--accent-2);
        }
        .copy-btn {
            position:absolute; top:6px; right:6px;
            background:var(--bg-3); border:1px solid var(--border);
            color:var(--text-3); padding:4px 8px; border-radius:4px;
            cursor:pointer; font-size:11px; opacity:0; transition:.15s;
        }
        .bubble pre:hover .copy-btn { opacity:1; }
        .copy-btn:hover { background:var(--accent); color:#fff; }

        .bubble h1,.bubble h2,.bubble h3 { margin:12px 0 6px; font-weight:600; }
        .bubble h1 { font-size:17px; }
        .bubble h2 { font-size:15px; }
        .bubble h3 { font-size:14px; }
        .bubble ul,.bubble ol { padding-left:18px; margin:6px 0; }
        .bubble li { margin:3px 0; }
        .bubble blockquote {
            border-left:3px solid var(--accent); padding-left:10px;
            margin:8px 0; color:var(--text-2);
        }
        .bubble a { color:var(--accent-2); text-decoration:none; }
        .bubble a:hover { text-decoration:underline; }
        .bubble table { border-collapse:collapse; margin:8px 0; width:100%; }
        .bubble th,.bubble td {
            border:1px solid var(--border); padding:6px 10px;
            text-align:left; font-size:12px;
        }
        .bubble th { background:var(--bg-3); }

        .typing-row {
            display:none; gap:10px; margin-bottom:20px;
            max-width:720px; margin-left:auto; margin-right:auto;
        }
        .typing-row.on { display:flex; }
        .typing-dots {
            display:flex; gap:5px; padding:12px 16px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); border-bottom-left-radius:4px;
        }
        .td {
            width:7px; height:7px; border-radius:50%;
            background:var(--accent); animation:tbounce 1.4s infinite;
        }
        .td:nth-child(2) { animation-delay:.2s; }
        .td:nth-child(3) { animation-delay:.4s; }
        @keyframes tbounce { 0%,60%,100%{transform:translateY(0);opacity:.3} 30%{transform:translateY(-6px);opacity:1} }

        .input-bar {
            padding: 12px 16px 16px; background: var(--bg-2);
            border-top: 1px solid var(--border); flex-shrink: 0;
        }
        .input-wrap {
            max-width:720px; margin:0 auto;
            display:flex; align-items:flex-end; gap:8px;
            background:var(--surface); border:1px solid var(--border);
            border-radius:var(--radius); padding:6px 8px; transition: .2s;
        }
        .input-wrap:focus-within {
            border-color:var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
        }
        #msgInput {
            flex:1; background:none; border:none; color:var(--text);
            font-size:14px; line-height:1.5; resize:none; outline:none;
            max-height:120px; min-height:22px; padding:4px 0; font-family:inherit;
        }
        #msgInput::placeholder { color:var(--text-3); }
        .btn-send {
            width:36px; height:36px;
            background:linear-gradient(135deg,#7c6af0,#6a5acd);
            border:none; border-radius:10px; color:#fff;
            font-size:16px; cursor:pointer; flex-shrink:0;
            display:flex; align-items:center; justify-content:center; transition:.15s;
        }
        .btn-send:hover { opacity:.85; }
        .btn-send:disabled { opacity:.3; cursor:default; }
        .input-hint { text-align:center; font-size:10px; color:var(--text-3); margin-top:6px; }

        .overlay {
            display:none; position:fixed; inset:0;
            background:rgba(0,0,0,.55); backdrop-filter:blur(6px);
            z-index:100; align-items:center; justify-content:center;
        }
        .overlay.on { display:flex; }
        .modal {
            background:var(--bg-2); border:1px solid var(--border);
            border-radius:20px; width:90%; max-width:440px;
            padding:24px; animation:modalIn .25s ease;
        }
        @keyframes modalIn { from{opacity:0;transform:scale(.96)} to{opacity:1;transform:scale(1)} }
        .modal h2 { font-size:18px; margin-bottom:20px; display:flex; align-items:center; gap:8px; }
        .sg { margin-bottom:16px; }
        .sg-label {
            font-size:12px; color:var(--text-2); margin-bottom:6px;
            display:flex; justify-content:space-between;
        }
        .sg-val { color:var(--accent-2); font-weight:600; }
        .sg-slider {
            width:100%; -webkit-appearance:none; height:5px;
            border-radius:3px; background:var(--bg-3); outline:none;
        }
        .sg-slider::-webkit-slider-thumb {
            -webkit-appearance:none; width:16px; height:16px;
            border-radius:50%; background:var(--accent); cursor:pointer;
        }
        .sg-input {
            width:100%; padding:9px 12px; background:var(--surface);
            border:1px solid var(--border); border-radius:var(--radius-sm);
            color:var(--text); font-size:13px; outline:none; transition:.15s;
        }
        .sg-input:focus { border-color:var(--accent); }
        .modal-foot { display:flex; gap:8px; margin-top:20px; }
        .mbtn {
            flex:1; padding:10px; border:none; border-radius:var(--radius-sm);
            font-size:13px; font-weight:600; cursor:pointer; transition:.15s;
        }
        .mbtn.pri { background:linear-gradient(135deg,#7c6af0,#6a5acd); color:#fff; }
        .mbtn.sec { background:var(--bg-3); color:var(--text-2); border:1px solid var(--border); }
        .mbtn:hover { opacity:.85; }

        .toast {
            position:fixed; bottom:80px; left:50%;
            transform:translateX(-50%) translateY(60px);
            padding:10px 20px; border-radius:var(--radius-sm);
            font-size:13px; z-index:200; opacity:0;
            transition:.3s; pointer-events:none;
        }
        .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

        .sb-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:49; }

        @media(max-width:768px) {
            .sidebar { position:fixed; left:0; top:0; bottom:0; transform:translateX(-100%); transition:.3s; }
            .sidebar.open { transform:translateX(0); }
            .sb-overlay.on { display:block; }
            .btn-menu { display:block; }
            .msg-body { max-width:85%; }
            .quick-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sb-overlay" id="sbOverlay"></div>
    <aside class="sidebar" id="sidebar">
        <div class="sb-head">
            <div class="logo">
                <div class="logo-img">🤖</div>
                <div>
                    <div class="logo-title">MiMo v2.5 Pro</div>
                    <div class="logo-sub">On-Device AI</div>
                </div>
            </div>
            <button class="btn-new" onclick="newChat()">＋ 新对话</button>
        </div>
        <div class="sb-list" id="chatList"></div>
        <div class="sb-foot">
            <div class="status">
                <span class="dot" id="dot"></span>
                <span id="statusText">连接中...</span>
            </div>
        </div>
    </aside>

    <main class="main">
        <header class="head">
            <div class="head-left">
                <button class="btn-menu" onclick="toggleSB()">☰</button>
                <div class="badge">MiMo v2.5 Pro</div>
            </div>
            <div class="head-right">
                <button class="head-btn" onclick="exportChat()" title="导出">📥</button>
                <button class="head-btn" onclick="clearChat()" title="清空">🗑️</button>
                <button class="head-btn" onclick="openSettings()" title="设置">⚙️</button>
            </div>
        </header>

        <div class="chat" id="chatBox">
            <div class="welcome" id="welcome">
                <div class="welcome-icon">🤖</div>
                <h2>你好，我是 MiMo</h2>
                <p>小米 AI 助手，随时为你效劳</p>
                <div class="quick-grid">
                    <div class="quick-card" onclick="quickSend('帮我写一个 Python 快速排序算法')">
                        <div class="qi">💻</div><div class="qt">写一段代码</div>
                    </div>
                    <div class="quick-card" onclick="quickSend('解释一下量子计算的基本原理')">
                        <div class="qi">🔬</div><div class="qt">解释概念</div>
                    </div>
                    <div class="quick-card" onclick="quickSend('把下面翻译成英文：人工智能正在改变世界')">
                        <div class="qi">🌐</div><div class="qt">翻译文本</div>
                    </div>
                    <div class="quick-card" onclick="quickSend('写一首关于春天的现代诗')">
                        <div class="qi">✍️</div><div class="qt">创意写作</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-bar">
            <div class="input-wrap">
                <textarea id="msgInput" rows="1" placeholder="输入消息..."
                          onkeydown="onKey(event)" oninput="autoH(this)"></textarea>
                <button class="btn-send" id="btnSend" onclick="send()">↑</button>
            </div>
            <div class="input-hint">Enter 发送 · Shift+Enter 换行</div>
        </div>
    </main>
</div>

<div class="overlay" id="settingsOv">
    <div class="modal">
        <h2>⚙️ 设置</h2>
        <div class="sg">
            <div class="sg-label"><span>API 地址 (代理地址，不要填云端地址)</span></div>
            <input class="sg-input" id="sApi" placeholder="http://localhost:9081">
        </div>
        <div class="sg">
            <div class="sg-label"><span>API Token</span></div>
            <input class="sg-input" id="sToken" type="password" placeholder="小米 API Token">
        </div>
        <div class="sg">
            <div class="sg-label"><span>Temperature</span><span class="sg-val" id="vTemp">0.7</span></div>
            <input class="sg-slider" type="range" id="sTemp" min="0" max="2" step="0.1" value="0.7"
                   oninput="document.getElementById('vTemp').textContent=this.value">
        </div>
        <div class="sg">
            <div class="sg-label"><span>Max Tokens</span><span class="sg-val" id="vMax">4096</span></div>
            <input class="sg-slider" type="range" id="sMax" min="256" max="16384" step="256" value="4096"
                   oninput="document.getElementById('vMax').textContent=this.value">
        </div>
        <div class="sg">
            <div class="sg-label"><span>Top P</span><span class="sg-val" id="vTop">0.9</span></div>
            <input class="sg-slider" type="range" id="sTop" min="0" max="1" step="0.05" value="0.9"
                   oninput="document.getElementById('vTop').textContent=this.value">
        </div>
        <div class="sg">
            <div class="sg-label"><span>系统提示词</span></div>
            <textarea class="sg-input" id="sSys" rows="3" style="resize:vertical"
            >你是 MiMo，小米开发的 AI 助手。请用中文回答，保持简洁专业。</textarea>
        </div>
        <div class="modal-foot">
            <button class="mbtn sec" onclick="closeSettings()">取消</button>
            <button class="mbtn pri" onclick="saveSettings()">保存</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ============================================================
 *  核心原则：S.api 始终指向本地代理 (localhost:9081)
 *  所有请求都走代理，绝不直连云端 API
 * ============================================================ */

const PROXY = location.origin;  // 自动获取当前页面地址 (http://host:9081)

let chats = JSON.parse(localStorage.getItem('mc') || '[]');
let curId = localStorage.getItem('mcur') || null;
let S = JSON.parse(localStorage.getItem('ms') || '{}');

// 合并默认值（S.api 始终是本地代理地址）
(function initSettings(){
    const defaults = { api: PROXY, token: '', temp:0.7, max:4096, top:0.9,
        sys:'你是 MiMo，小米开发的 AI 助手。请用中文回答，保持简洁专业。' };
    for (const k in defaults) {
        if (S[k] === undefined || S[k] === null || S[k] === '') S[k] = defaults[k];
    }
    // 强制 api 指向本地代理（用户不应修改此项指向云端）
    if (!S.api || S.api.includes('api.mi.com') || S.api.includes('localhost:8080')) {
        S.api = PROXY;
    }
})();

// 从服务器获取 Token（服务端配置文件是 Token 的唯一真实来源）
(async()=>{
    try {
        const r = await fetch(PROXY + '/api/config');
        if (r.ok) {
            const cfg = await r.json();
            // 用服务端的 Token 覆盖本地（服务端读取自配置文件）
            if (cfg.hasToken && cfg.token) S.token = cfg.token;
            else if (cfg.hasToken === false) S.token = '';
        }
    } catch {}
})();

function init(){
    renderList();
    if(curId) loadChat(curId);
    ping();
    document.getElementById('msgInput').focus();
}

/* ========== 状态检测（走代理） ========== */
async function ping(){
    const dot=document.getElementById('dot'), txt=document.getElementById('statusText');
    try{
        const headers = {};
        if(S.token) headers['Authorization'] = 'Bearer ' + S.token;
        // 走本地代理，不直连云端
        const r = await fetch(PROXY + '/v1/models', {headers, signal:AbortSignal.timeout(5000)});
        if(r.ok || r.status===401) { dot.className='dot'; txt.textContent='已连接'; }
        else { dot.className='dot off'; txt.textContent='服务异常'; }
    } catch(e) {
        dot.className='dot off'; txt.textContent='代理未运行';
    }
}
setInterval(ping, 30000);

/* ========== 对话管理 ========== */
function newChat(){
    const c={id:''+Date.now(),title:'新对话',msgs:[],ts:Date.now()};
    chats.unshift(c); curId=c.id; save(); renderList(); renderChat(); closeSB();
}
function loadChat(id){
    curId=id; localStorage.setItem('mcur',id);
    renderList(); renderChat(); closeSB();
}
function delChat(id,e){
    e.stopPropagation();
    chats=chats.filter(c=>c.id!==id);
    if(curId===id) curId=chats[0]?.id||null;
    save(); renderList(); renderChat();
}
function clearChat(){
    const c=chats.find(c=>c.id===curId);
    if(c){c.msgs=[];c.title='新对话';save();renderChat();renderList();}
}
function save(){
    localStorage.setItem('mc',JSON.stringify(chats));
    localStorage.setItem('mcur',curId||'');
}

/* ========== 渲染 ========== */
function renderList(){
    document.getElementById('chatList').innerHTML=chats.map(c=>`
        <div class="chat-item${c.id===curId?' active':''}" onclick="loadChat('${c.id}')">
            <span>💬</span>
            <span class="ci-text">${esc(c.title)}</span>
            <button class="ci-del" onclick="delChat('${c.id}',event)">×</button>
        </div>
    `).join('');
}

function renderChat(){
    const box=document.getElementById('chatBox');
    const w=document.getElementById('welcome');
    const c=chats.find(c=>c.id===curId);
    if(!c||!c.msgs.length){w.style.display='flex';box.innerHTML='';box.appendChild(w);return;}
    w.style.display='none';
    box.innerHTML=c.msgs.map(m=>`
        <div class="msg ${m.r}">
            <div class="msg-av">${m.r==='user'?'👤':'🤖'}</div>
            <div class="msg-body">
                <div class="bubble">${fmt(m.t)}</div>
                <div class="msg-time">${time(m.ts)}</div>
            </div>
        </div>
    `).join('')+`
        <div class="typing-row" id="typingRow">
            <div class="msg-av" style="background:var(--bg-3);border:1px solid var(--border)">🤖</div>
            <div class="typing-dots"><div class="td"></div><div class="td"></div><div class="td"></div></div>
        </div>
    `;
    goBottom();
}

function goBottom(){
    const b=document.getElementById('chatBox');
    requestAnimationFrame(()=>b.scrollTop=b.scrollHeight);
}

/* ========== 格式化 ========== */
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function time(ts){if(!ts)return'';return new Date(ts).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});}

function fmt(s){
    if(!s)return'';
    s=s.replace(/```(\w*)\n([\s\S]*?)```/g,(_,l,c)=>
        `<pre><code class="lang-${l||''}">${esc(c.trim())}</code><button class="copy-btn" onclick="copyC(this)">复制</button></pre>`);
    s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
    s=s.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    s=s.replace(/\*(.*?)\*/g,'<em>$1</em>');
    s=s.replace(/^### (.*$)/gm,'<h3>$1</h3>');
    s=s.replace(/^## (.*$)/gm,'<h2>$1</h2>');
    s=s.replace(/^# (.*$)/gm,'<h1>$1</h1>');
    s=s.replace(/^[-*] (.*$)/gm,'<li>$1</li>');
    s=s.replace(/(<li>.*<\/li>)/gs,'<ul>$1</ul>');
    s=s.replace(/^> (.*$)/gm,'<blockquote>$1</blockquote>');
    s=s.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');
    s=s.replace(/\n/g,'<br>');
    return s;
}

/* ========== 发送（走代理，不直连云端） ========== */
async function send(){
    const inp=document.getElementById('msgInput');
    const txt=inp.value.trim();
    if(!txt)return;
    if(!curId) newChat();
    const c=chats.find(c=>c.id===curId);
    if(!c)return;

    c.msgs.push({r:'user',t:txt,ts:Date.now()});
    if(c.msgs.length===1) c.title=txt.substring(0,30)+(txt.length>30?'...':'');
    inp.value=''; inp.style.height='auto';
    save(); renderChat(); renderList();

    const typing=document.getElementById('typingRow');
    if(typing) typing.classList.add('on');
    goBottom();

    try{
        const msgs=[
            {role:'system', content:S.sys},
            ...c.msgs.map(m=>({role:m.r==='user'?'user':'assistant', content:m.t}))
        ];

        // 构建请求头（Token 通过代理转发到云端）
        const headers = {'Content-Type':'application/json'};
        if(S.token) headers['Authorization'] = 'Bearer ' + S.token;

        // ★ 所有请求走本地代理 (PROXY = http://host:9081)
        // ★ 路径 /v1/chat/completions 由 server.py 代理到云端
        const res = await fetch(PROXY + '/v1/chat/completions', {
            method:'POST',
            headers,
            body: JSON.stringify({
                messages: msgs,
                max_tokens: S.max,
                temperature: S.temp,
                top_p: S.top,
                stream: true
            })
        });
        if(!res.ok) throw new Error('HTTP ' + res.status);

        // SSE 流式读取
        const reader = res.body.getReader();
        const dec = new TextDecoder();
        let ai = '', buf = '';
        const aiMsg = {r:'ai', t:'', ts:Date.now()};
        c.msgs.push(aiMsg);

        while(true){
            const {done, value} = await reader.read();
            if(done) break;
            buf += dec.decode(value, {stream:true});
            const lines = buf.split('\n');
            buf = lines.pop() || '';
            for(const ln of lines){
                if(!ln.startsWith('data: ')) continue;
                const d = ln.slice(6);
                if(d === '[DONE]') continue;
                try{
                    const j = JSON.parse(d);
                    const delta = j.choices?.[0]?.delta?.content;
                    if(delta){ ai += delta; aiMsg.t = ai; renderChat(); }
                } catch{}
            }
        }

        // 非流式回退
        if(!ai){
            const res2 = await fetch(PROXY + '/v1/chat/completions', {
                method:'POST',
                headers,
                body: JSON.stringify({
                    messages: msgs,
                    max_tokens: S.max,
                    temperature: S.temp,
                    top_p: S.top,
                    stream: false
                })
            });
            const j = await res2.json();
            ai = j.choices?.[0]?.message?.content || j.error?.message || '无响应';
            aiMsg.t = ai;
        }

        save(); renderChat();

    } catch(e){
        console.error(e);
        toast('连接失败: ' + e.message, 'var(--red)');
        // 移除失败的空 AI 消息
        const last = c.msgs[c.msgs.length-1];
        if(last && last.r==='ai' && !last.t) c.msgs.pop();
        save(); renderChat();
    } finally {
        if(typing) typing.classList.remove('on');
    }
}

function quickSend(t){
    document.getElementById('msgInput').value = t;
    send();
}

/* ========== 输入 ========== */
function onKey(e){
    if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); }
}
function autoH(el){
    el.style.height='auto';
    el.style.height=Math.min(el.scrollHeight,120)+'px';
}

/* ========== 复制 ========== */
function copyC(btn){
    const code=btn.previousElementSibling.textContent;
    navigator.clipboard.writeText(code).then(()=>{
        btn.textContent='✓'; setTimeout(()=>btn.textContent='复制',1500);
    });
}

/* ========== 导出 ========== */
function exportChat(){
    const c=chats.find(c=>c.id===curId);
    if(!c)return;
    const t=c.msgs.map(m=>`[${m.r==='user'?'用户':'MiMo'}] ${time(m.ts)}\n${m.t}\n`).join('\n');
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([t],{type:'text/plain'}));
    a.download=`mimo-${c.title}.txt`; a.click();
}

/* ========== 设置 ========== */
function openSettings(){
    document.getElementById('sApi').value = S.api;
    document.getElementById('sToken').value = S.token || '';
    document.getElementById('sTemp').value = S.temp;
    document.getElementById('vTemp').textContent = S.temp;
    document.getElementById('sMax').value = S.max;
    document.getElementById('vMax').textContent = S.max;
    document.getElementById('sTop').value = S.top;
    document.getElementById('vTop').textContent = S.top;
    document.getElementById('sSys').value = S.sys;
    document.getElementById('settingsOv').classList.add('on');
}
function closeSettings(){ document.getElementById('settingsOv').classList.remove('on'); }
function saveSettings(){
    // api 地址不允许改成云端地址，只能是本地代理
    let newApi = document.getElementById('sApi').value.replace(/\/$/,'');
    if(newApi.includes('api.mi.com')){
        toast('API 地址应为本地代理地址，不是云端地址', 'var(--yellow)');
        return;
    }
    S.api = newApi || PROXY;
    S.token = document.getElementById('sToken').value.trim();
    S.temp = +document.getElementById('sTemp').value;
    S.max = +document.getElementById('sMax').value;
    S.top = +document.getElementById('sTop').value;
    S.sys = document.getElementById('sSys').value;
    localStorage.setItem('ms', JSON.stringify(S));

    // Token 变更后通知服务端（可选，服务端也可从配置文件读取）
    if(S.token){
        fetch(PROXY + '/api/config', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify({token: S.token})
        }).catch(()=>{});
    }

    closeSettings(); ping(); toast('设置已保存','var(--green)');
}

/* ========== 侧边栏 ========== */
function toggleSB(){
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sbOverlay').classList.toggle('on');
}
function closeSB(){
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sbOverlay').classList.remove('on');
}
document.getElementById('sbOverlay').onclick = closeSB;

/* ========== Toast ========== */
function toast(msg, color){
    const t=document.getElementById('toast');
    t.textContent=msg; t.style.background=color||'var(--accent)';
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 2500);
}

/* ========== 快捷键 ========== */
document.addEventListener('keydown', e=>{
    if((e.ctrlKey||e.metaKey) && e.key==='n'){ e.preventDefault(); newChat(); }
    if((e.ctrlKey||e.metaKey) && e.key===','){ e.preventDefault(); openSettings(); }
    if(e.key==='Escape') closeSettings();
});

init();
</script>
