# ═══════════════════════════════════════════
#  ipq806x 平台配置
# ═══════════════════════════════════════════
target: ipq806x
version: "1.0.0"
description: "Qualcomm Atheros IPQ806X"
kernel_patchver: "6.12"

subtargets:
  generic:
    default_device: arris_tr4400-v2
    soc: ipq806x
    features: [squashfs, ext4, f2fs, nand, ramdisk, fpu]
    nss: false
    kernel_name: "zImage Image dtbs"

  chromium:
    default_device: arris_tr4400-v2
    soc: ipq806x
    features: [squashfs, ext4, f2fs, nand, ramdisk, fpu]
    nss: false
    kernel_name: "zImage Image dtbs"

packages:
  default:
    - kmod-ath10k-ct
    - ath10k-firmware-qca988x-ct
    - kmod-usb-dwc3
    - kmod-usb3
    - kmod-gpio-button-hotplug
    - kmod-leds-gpio

  nss: []

  base:
    - luci-app-sqm
    - luci-app-diskman

  blocked: []

constraints:
  firewall: [iptables, nftables]
  wifi: true
  rootfs: [squashfs, ext4, f2fs]

build_hints:
  parallel_jobs: 0
  ccache: true
  timeout_minutes: 480
  download_retry: 2

metadata:
  source_url: https://github.com/LiBwrt/openwrt-6.x
  docs_url: https://github.com/liuziqiang78-liu/OpenWRT-CI
  maintainer: liuziqiang78-liu
  last_verified: "2026-04-23"
