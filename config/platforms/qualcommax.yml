# ═══════════════════════════════════════════
#  qualcommax 平台配置
#  遵循 config/schema.yml 规范
# ═══════════════════════════════════════════
target: qualcommax
version: "1.0.0"
description: "Qualcomm Atheros 802.11ax WiSoC-s"
kernel_patchver: "6.12"

# ── Subtargets ──
subtargets:
  ipq807x:
    default_device: aliyun_ap8220
    soc: ipq807x
    features: [squashfs, ext4, f2fs, nand, emmc, ramdisk, fpu, rtc]
    nss: true
    kernel_name: Image

  ipq60xx:
    default_device: 8devices_mango-dvk
    soc: ipq6010
    features: [squashfs, ext4, f2fs, nand, emmc, ramdisk, fpu, rtc]
    nss: true
    kernel_name: Image

  ipq50xx:
    default_device: cmcc_pz-l8
    soc: ipq5018
    features: [squashfs, ext4, f2fs, nand, ramdisk, fpu, rtc]
    nss: true
    kernel_name: Image

# ── 包配置 ──
packages:
  default:
    - ath11k-firmware-ipq6018
    - nss-firmware-ipq60xx
    - kmod-qca-nss-crypto
    - autocore
    - automount
    - cpufreq
    - e2fsprogs
    - f2fs-tools
    - losetup
    - luci
    - uboot-envtools
    - wpad-openssl
    - kmod-ath11k
    - kmod-ath11k-ahb
    - kmod-ath11k-pci
    - kmod-dsa
    - kmod-dsa-qca8k
    - kmod-phy-aquantia
    - kmod-phy-qca83xx
    - kmod-fs-ext4
    - kmod-fs-f2fs
    - kmod-gpio-button-hotplug
    - kmod-leds-gpio
    - kmod-leds-pwm
    - kmod-usb3
    - kmod-usb-dwc3
    - kmod-usb-dwc3-qcom
    - kmod-qca-nss-dp
    - kmod-nss-ifb
    - kmod-qca-nss-drv
    - kmod-qca-nss-ecm

  nss:
    - kmod-qca-nss-drv-bridge-mgr
    - kmod-qca-nss-drv-eogremgr
    - kmod-qca-nss-drv-gre
    - kmod-qca-nss-drv-igs
    - kmod-qca-nss-drv-l2tpv2
    - kmod-qca-nss-drv-lag-mgr
    - kmod-qca-nss-drv-map-t
    - kmod-qca-nss-drv-match
    - kmod-qca-nss-drv-mirror
    - kmod-qca-nss-drv-netlink
    - kmod-qca-nss-drv-pppoe
    - kmod-qca-nss-drv-pptp
    - kmod-qca-nss-drv-qdisc
    - kmod-qca-nss-drv-tun6rd
    - kmod-qca-nss-drv-tunipip6
    - kmod-qca-nss-drv-vlan-mgr
    - kmod-qca-nss-drv-vxlanmgr
    - kmod-qca-nss-drv-wifi-meshmgr

  base:
    - luci-app-sqm
    - luci-app-diskman
    - luci-app-ledtrig-rssi
    - luci-app-ledtrig-switch
    - luci-app-ledtrig-usbport

  blocked: []

# ── 约束条件 ──
constraints:
  firewall: [iptables, nftables]
  wifi: true
  rootfs: [squashfs, ext4, f2fs]
  emmc_subtargets: [ipq807x, ipq60xx]

# ── 编译建议 ──
build_hints:
  parallel_jobs: 0          # auto (nproc+1)
  ccache: true
  timeout_minutes: 720
  download_retry: 2

# ── 元数据 ──
metadata:
  source_url: https://github.com/LiBwrt/openwrt-6.x
  docs_url: https://github.com/liuziqiang78-liu/OpenWRT-CI
  maintainer: liuziqiang78-liu
  last_verified: "2026-04-23"
