# ═══════════════════════════════════════════
#  ipq40xx 平台配置
# ═══════════════════════════════════════════
target: ipq40xx
version: "1.0.0"
description: "Qualcomm Atheros IPQ40XX"
kernel_patchver: "6.12"

subtargets:
  generic:
    default_device: 8dev_habanero-dvk
    soc: ipq4019
    features: [squashfs, ext4, f2fs, ramdisk, fpu]
    nss: false
    kernel_name: "zImage Image dtbs"

  chromium:
    default_device: asus_map-ac1300
    soc: ipq4019
    features: [squashfs, ext4, f2fs, ramdisk, fpu]
    nss: false
    kernel_name: "zImage Image dtbs"

  mikrotik:
    default_device: mikrotik_hap-ac2
    soc: ipq4019
    features: [squashfs, ext4, f2fs, ramdisk, fpu]
    nss: false
    kernel_name: "zImage Image dtbs"

packages:
  default:
    - kmod-ath10k-ct
    - ath10k-firmware-qca4019-ct
    - kmod-usb-dwc3
    - kmod-usb-dwc3-qcom
    - kmod-usb3
    - kmod-gpio-button-hotplug
    - kmod-leds-gpio

  nss: []

  base:
    - luci-app-sqm
    - luci-app-diskman

  blocked: []

constraints:
  firewall: [iptables, nftables]
  wifi: true
  rootfs: [squashfs, ext4, f2fs]

build_hints:
  parallel_jobs: 0
  ccache: true
  timeout_minutes: 480
  download_retry: 2

metadata:
  source_url: https://github.com/LiBwrt/openwrt-6.x
  docs_url: https://github.com/liuziqiang78-liu/OpenWRT-CI
  maintainer: liuziqiang78-liu
  last_verified: "2026-04-23"
