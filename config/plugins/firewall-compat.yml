# ═══════════════════════════════════════════
#  插件防火墙兼容性注册表
#  fw: 0 = 双兼容, 1 = 仅 iptables, 2 = 仅 nftables
# ═══════════════════════════════════════════
version: "1.0.0"

rules:
  # ── 仅 iptables 兼容 ──
  iptables_only:
    - luci-app-ssr-plus
    - luci-app-passwall
    - luci-app-passwall2
    - luci-app-vssr
    - luci-app-openclash
    - luci-app-bypass
    - luci-app-kiddown
    - luci-app-unblockneteasemusic
    - luci-app-usb-printer
    - luci-app-xlnetacc
    - luci-app-cifs-mount
    - luci-app-dockerman
    - luci-app-docker
    - luci-app-kodexplorer
    - luci-app-jd-dailybonus
    - luci-app-serverchan
    - luci-app-turboacc
    - luci-app-flowoffload
    - luci-app-sfe
    - luci-app-nft-qos
    - luci-app-arpbind

  # ── 仅 nftables 兼容 ──
  nftables_only: []

  # ── 双兼容 (默认，无需声明) ──
  # 所有未在 iptables_only / nftables_only 中列出的插件
  # 均视为双兼容

# ── 插件依赖关系 ──
dependencies:
  luci-app-openclash: [coreutils-nohup, bash, curl, jsonfilter, ca-certificates, ipset, ip-full, libcap, libcap-bin, ruby, ruby-yaml, kmod-tun, kmod-inet-diag]
  luci-app-passwall: [chinadns-ng, dns2socks, dns2tcp, hysteria, ipt2socks, iptables, lua-neturl, microsocks, naive-proxy, redsocks2, shadowsocks-libev-ss-local, shadowsocks-libev-ss-redir, shadowsocks-rust-sslocal, simple-obfs, sing-box, tcping, trojan, trojan-go, tuic-client, v2ray-core, v2ray-plugin, xray-core]
  luci-app-ssr-plus: [shadowsocks-libev-ss-local, shadowsocks-libev-ss-redir, shadowsocksr-libev-ssr-local, shadowsocksr-libev-ssr-redir, dns2socks, ipt2socks, microsocks, simple-obfs, tcping, kmod-ipt-nat-extra]
  luci-app-adguardhome: [AdGuardHome]
  luci-app-vssr: [shadowsocks-libev, shadowsocksr-libev, dns2socks, ipt2socks, microsocks, simple-obfs, tcping]
