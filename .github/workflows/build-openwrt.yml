# ──────────────────────────────────────────────
# OpenWrt 云编译工作流
# 仓库: liuziqiang78-liu/openwrt-6.x
# ──────────────────────────────────────────────
name: 🚀 Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      branch:
        description: '源码分支'
        required: true
        default: 'main-nss'
        type: choice
        options:
          - main-nss
          - kernel-6.6
      target:
        description: 'Target 平台'
        required: true
        default: 'qualcommax'
        type: choice
        options:
          - qualcommax
          - ipq40xx
          - ipq806x
      subtarget:
        description: 'Subtarget (qualcommax 专用)'
        required: false
        default: 'ipq807x'
        type: choice
        options:
          - ipq807x
          - ipq60xx
          - ipq50xx
      profile:
        description: '设备型号 (空格分隔, 留空=全部)'
        required: false
        default: ''
        type: string
      plugins:
        description: '额外插件 (空格分隔, 如 luci-app-passwall luci-app-adguardhome)'
        required: false
        default: ''
        type: string
      root_password:
        description: 'Root 密码 (留空=无密码)'
        required: false
        default: ''
        type: string
      lan_ip:
        description: 'LAN IP 地址'
        required: false
        default: '192.168.1.1'
        type: string
      custom_config:
        description: '自定义 .config (base64编码)'
        required: false
        default: ''
        type: string
      enable_ccache:
        description: '启用 ccache'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_artifacts:
        description: '上传固件'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REPO_URL: https://github.com/liuziqiang78-liu/openwrt-6.x
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    steps:
      - name: 🛎️ Checkout workflow repo
        uses: actions/checkout@v4

      - name: 📦 Clone OpenWrt Source
        run: |
          git clone --depth 1 --single-branch \
            -b ${{ inputs.branch }} \
            ${{ env.REPO_URL }} openwrt

      - name: 📥 Update & Install Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: ⚙️ Generate Config
        run: |
          cd openwrt

          # ── Target 配置 ──
          if [ "${{ inputs.target }}" = "qualcommax" ]; then
            cat > .config <<EOF
          CONFIG_TARGET_qualcommax=y
          CONFIG_TARGET_qualcommax_${{ inputs.subtarget }}=y
          EOF
          else
            cat > .config <<EOF
          CONFIG_TARGET_${{ inputs.target }}=y
          EOF
          fi

          # ── 设备 Profile ──
          if [ -n "${{ inputs.profile }}" ]; then
            for dev in ${{ inputs.profile }}; do
              if [ "${{ inputs.target }}" = "qualcommax" ]; then
                echo "CONFIG_TARGET_DEVICE_qualcommax_${{ inputs.subtarget }}_DEVICE_${dev}=y" >> .config
              else
                echo "CONFIG_TARGET_DEVICE_${{ inputs.target }}_DEVICE_${dev}=y" >> .config
              fi
            done
          fi

          # ── NSS 支持 (默认开启) ──
          cat >> .config <<'EOF'
          # NSS Support
          CONFIG_PACKAGE_kmod-qca-nss-drv=y
          CONFIG_PACKAGE_kmod-qca-nss-ecm=y
          CONFIG_PACKAGE_kmod-qca-nss-dp=y
          CONFIG_PACKAGE_kmod-nss-ifb=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-bridge-mgr=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-pppoe=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-vlan-mgr=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-gre=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-l2tpv2=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-vxlanmgr=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-mirror=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-tunipip6=y
          CONFIG_PACKAGE_kmod-qca-nss-drv-wifi-meshmgr=y
          EOF

          # ── LuCI 中文 ──
          cat >> .config <<'EOF'
          # LuCI
          CONFIG_LUCI_LANG_zh_Hans=y
          EOF

          # ── 用户插件 ──
          if [ -n "${{ inputs.plugins }}" ]; then
            echo "# Custom Plugins" >> .config
            for pkg in ${{ inputs.plugins }}; do
              echo "CONFIG_PACKAGE_${pkg}=y" >> .config
            done
          fi

          # ── ccache ──
          if [ "${{ inputs.enable_ccache }}" = "true" ]; then
            echo "CONFIG_CCACHE=y" >> .config
          fi

          # ── 自定义 config (base64) ──
          if [ -n "${{ inputs.custom_config }}" ]; then
            echo "${{ inputs.custom_config }}" | base64 -d >> .config
          fi

          # ── 生成完整配置 ──
          make defconfig

      - name: 📋 Config Summary
        if: always()
        run: |
          cd openwrt
          PLUGIN_COUNT=$(grep -c '=y' .config | head -1 || echo 0)
          echo "### 📋 编译配置" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---|" >> $GITHUB_STEP_SUMMARY
          echo "| 分支 | \`${{ inputs.branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${{ inputs.target }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Subtarget | \`${{ inputs.subtarget }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 设备 | \`${{ inputs.profile }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 插件数 | \`${PLUGIN_COUNT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ccache | \`${{ inputs.enable_ccache }}\` |" >> $GITHUB_STEP_SUMMARY

      - name: 🔨 Download Sources
        run: |
          cd openwrt
          make download -j$(nproc) || make download -j1 V=s

      - name: 🔧 Build Toolchain
        run: |
          cd openwrt
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)

      - name: 🏗️ Build Firmware
        run: |
          cd openwrt
          BUILD_JOBS=$(($(nproc) + 1))
          make -j${BUILD_JOBS} 2>&1 | tee build.log

      - name: 📤 Upload Firmware
        if: inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ inputs.target }}-${{ inputs.subtarget }}-run${{ github.run_number }}
          path: |
            openwrt/bin/targets/**/*.bin
            openwrt/bin/targets/**/*.itb
            openwrt/bin/targets/**/*.img
            openwrt/bin/targets/**/*.ubi
            openwrt/bin/targets/**/*.tar
          retention-days: 7
          if-no-files-found: warn

      - name: 📊 Build Summary
        if: always()
        run: |
          cd openwrt
          echo "### 📊 编译结果" >> $GITHUB_STEP_SUMMARY
          if [ -f build.log ]; then
            ERRORS=$(grep -ci "error" build.log 2>/dev/null || echo 0)
            WARNINGS=$(grep -ci "warning" build.log 2>/dev/null || echo 0)
            echo "| 指标 | 值 |" >> $GITHUB_STEP_SUMMARY
            echo "|:---|:---|" >> $GITHUB_STEP_SUMMARY
            echo "| 错误数 | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY
            echo "| 警告数 | ${WARNINGS} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 固件文件" >> $GITHUB_STEP_SUMMARY
          find bin/targets/ -type f \( -name "*.bin" -o -name "*.itb" -o -name "*.img" -o -name "*.ubi" -o -name "*.tar" \) 2>/dev/null | head -30 | while read f; do
            SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
            echo "- \`$f\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
          done
