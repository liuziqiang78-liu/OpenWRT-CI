# ──────────────────────────────────────────────
# OpenWrt 云编译工作流 (分层架构 v2)
# 仓库: LiBwrt/openwrt-6.x
# ──────────────────────────────────────────────
name: 🚀 Build OpenWrt Firmware

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: '源码分支'
        required: true
        default: 'main-nss'
        type: choice
        options:
          - main-nss
          - 25.12-nss
      target:
        description: 'Target 平台'
        required: true
        default: 'qualcommax'
        type: choice
        options:
          - qualcommax
          - ipq40xx
          - ipq806x
      subtarget:
        description: 'Subtarget (qualcommax 专用)'
        required: false
        default: 'ipq807x'
        type: choice
        options:
          - ipq807x
          - ipq60xx
          - ipq50xx
      firewall:
        description: '防火墙'
        required: true
        default: 'iptables'
        type: choice
        options:
          - iptables
          - nftables
      profile:
        description: '设备型号 (空格分隔, 留空=全部)'
        required: false
        default: ''
        type: string
      plugins:
        description: '额外插件 (空格分隔, 如 luci-app-passwall luci-app-adguardhome)'
        required: false
        default: ''
        type: string
      root_password:
        description: 'Root 密码 (留空=无密码)'
        required: false
        default: ''
        type: string
      lan_ip:
        description: 'LAN IP 地址'
        required: false
        default: '192.168.1.1'
        type: string
      wifi_ssid:
        description: 'WiFi 名称 (SSID)'
        required: false
        default: ''
        type: string
      wifi_password:
        description: 'WiFi 密码'
        required: false
        default: ''
        type: string
      custom_config:
        description: '自定义 .config (base64编码)'
        required: false
        default: ''
        type: string
      enable_ccache:
        description: '启用 ccache'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      upload_artifacts:
        description: '上传固件'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 720
    steps:
      # ── Layer 2.1: 检出 (含平台配置 + 脚本) ──
      - name: 🛎️ Checkout workflow repo
        uses: actions/checkout@v4

      # ── Layer 2.2: 克隆源码 ──
      - name: 📦 Clone OpenWrt Source
        run: |
          git clone --depth 1 --single-branch \
            -b ${{ inputs.source_branch }} \
            ${{ env.REPO_URL }} openwrt

      # ── Layer 2.3: 安装 Feeds ──
      - name: 📥 Update & Install Feeds
        run: |
          cd openwrt
          echo 'src-git kenzo https://github.com/kenzok8/openwrt-packages' >> feeds.conf.default
          echo 'src-git small https://github.com/kenzok8/small' >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ── Layer 3+4: 配置生成 + 验证 (composite action) ──
      - name: ⚙️ Generate & Validate Config
        uses: ./.github/actions/generate-config
        with:
          target: ${{ inputs.target }}
          subtarget: ${{ inputs.subtarget }}
          profile: ${{ inputs.profile }}
          firewall: ${{ inputs.firewall }}
          plugins: ${{ inputs.plugins }}
          root_password: ${{ inputs.root_password }}
          lan_ip: ${{ inputs.lan_ip }}
          wifi_ssid: ${{ inputs.wifi_ssid }}
          wifi_password: ${{ inputs.wifi_password }}
          custom_config: ${{ inputs.custom_config }}
          enable_ccache: ${{ inputs.enable_ccache }}

      # ── Layer 2.4: 编译配置摘要 ──
      - name: 📋 Config Summary
        if: always()
        run: |
          cd openwrt
          ACTUAL_TARGET=$(grep -oP 'CONFIG_TARGET_\K[a-z0-9]+(?==y)' .config | head -1)
          ACTUAL_SUBTARGET=$(grep -oP "CONFIG_TARGET_${ACTUAL_TARGET}_\\K[a-z0-9]+(?==y)" .config | head -1)
          ACTUAL_DEVICE=$(grep -oP 'CONFIG_TARGET.*DEVICE_\K[^=]+(?==y)' .config | head -1)
          FW_TYPE=$(grep -q 'CONFIG_PACKAGE_firewall4=y' .config && echo 'nftables' || echo 'iptables')
          PLUGIN_COUNT=$(grep -c '=y' .config || echo 0)

          echo "### 📋 编译配置" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|:---|:---|" >> $GITHUB_STEP_SUMMARY
          echo "| 源码分支 | \`${{ inputs.source_branch }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`${ACTUAL_TARGET}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Subtarget | \`${ACTUAL_SUBTARGET}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 设备 | \`${ACTUAL_DEVICE:-'(全部)'}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 防火墙 | \`${FW_TYPE}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 插件数 | \`${PLUGIN_COUNT}\` |" >> $GITHUB_STEP_SUMMARY

      # ── Layer 5: 下载源码 ──
      - name: 🔨 Download Sources
        run: |
          cd openwrt
          make download -j$(nproc) || make download -j1 V=s

      # ── Layer 6: 编译工具链 ──
      - name: 🔧 Build Toolchain
        run: |
          cd openwrt
          make tools/install -j$(nproc)
          make toolchain/install -j$(nproc)

      # ── Layer 7: 编译固件 ──
      - name: 🏗️ Build Firmware
        run: |
          cd openwrt
          BUILD_JOBS=$(($(nproc) + 1))
          make -j${BUILD_JOBS} 2>&1 | tee build.log

      # ── Layer 8: 打包上传 ──
      - name: 📤 Upload Firmware
        if: inputs.upload_artifacts == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ inputs.target }}-${{ inputs.subtarget }}-run${{ github.run_number }}
          path: |
            openwrt/bin/targets/**/*.bin
            openwrt/bin/targets/**/*.itb
            openwrt/bin/targets/**/*.img
            openwrt/bin/targets/**/*.ubi
            openwrt/bin/targets/**/*.tar
          retention-days: 7
          if-no-files-found: warn

      # ── Layer 9: 构建报告 ──
      - name: 📊 Build Summary
        if: always()
        run: |
          cd openwrt
          echo "### 📊 编译结果" >> $GITHUB_STEP_SUMMARY
          if [ -f build.log ]; then
            ERRORS=$(grep -ci "error" build.log 2>/dev/null || echo 0)
            WARNINGS=$(grep -ci "warning" build.log 2>/dev/null || echo 0)
            echo "| 指标 | 值 |" >> $GITHUB_STEP_SUMMARY
            echo "|:---|:---|" >> $GITHUB_STEP_SUMMARY
            echo "| 错误数 | ${ERRORS} |" >> $GITHUB_STEP_SUMMARY
            echo "| 警告数 | ${WARNINGS} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 固件文件" >> $GITHUB_STEP_SUMMARY
          find bin/targets/ -type f \( -name "*.bin" -o -name "*.itb" -o -name "*.img" -o -name "*.ubi" -o -name "*.tar" \) 2>/dev/null | head -30 | while read f; do
            SIZE=$(du -sh "$f" 2>/dev/null | cut -f1)
            echo "- \`$f\` (${SIZE})" >> $GITHUB_STEP_SUMMARY
          done
