name: Custom Build

on:
  # 手动触发 - 可定制配置
  workflow_dispatch:
    inputs:
      # OpenWRT 源码选择
      WRT_SOURCE:
        description: 'OpenWRT 源码'
        required: true
        type: choice
        options:
          - immortalwrt/immortalwrt
          - VIKINGYFY/immortalwrt
          - LiBwrt/openwrt-6.x
          - qosmio/openwrt-ipq
        default: 'VIKINGYFY/immortalwrt'
      
      # 源码分支
      WRT_BRANCH:
        description: '源码分支 (对于 VIKINGYFY/immortalwrt 推荐使用 "owrt" 分支)'
        required: true
        default: 'main'
        type: string
      
      # 目标平台
      TARGET_PLATFORM:
        description: '目标平台'
        required: true
        type: choice
        options:
          - MEDIATEK
          - ROCKCHIP
          - X86
          - IPQ50XX-WIFI-YES
          - IPQ50XX-WIFI-NO
          - IPQ60XX-WIFI-YES
          - IPQ60XX-WIFI-NO
          - IPQ807X-WIFI-YES
          - IPQ807X-WIFI-NO
        default: 'MEDIATEK'
      
      # 科学上网插件
      PROXY_PLUGIN:
        description: '科学上网插件 (可多选，用逗号分隔)'
        required: false
        type: string
        placeholder: 'homeproxy,openclash,passwall'
      
      # 科学上网插件版本
      PROXY_VERSION:
        description: '科学上网插件版本 (留空使用最新)'
        required: false
        type: string
        placeholder: 'v1.9.5,v0.45.87,v2.8.3'
      
      # 存储插件
      STORAGE_PLUGIN:
        description: '存储插件 (可多选，用逗号分隔)'
        required: false
        type: string
        placeholder: 'diskman,samba4,aria2,qbittorrent'
      
      # 网络工具
      NETWORK_TOOL:
        description: '网络工具 (可多选，用逗号分隔)'
        required: false
        type: string
        placeholder: 'tailscale,ddns-go,easytier,vnt'
      
      # 主题
      THEME:
        description: 'UI 主题'
        required: false
        type: choice
        options:
          - argon
          - aurora
          - kucat
          - none
        default: 'argon'
      
      # 其他插件
      OTHER_PLUGIN:
        description: '其他插件 (用逗号分隔)'
        required: false
        type: string
      
      # 防火墙选择
      FIREWALL_TYPE:
        description: '防火墙类型'
        required: false
        type: choice
        options:
          - firewall4
          - iptables
        default: 'firewall4'
      
      # 路由器配置
      LAN_IP:
        description: '路由器默认 IP'
        required: false
        type: string
        default: '192.168.1.1'
      
      LOGIN_USERNAME:
        description: '登录用户名'
        required: false
        type: string
        default: 'root'
      
      LOGIN_PASSWORD:
        description: '登录密码'
        required: false
        type: string
        default: ''
      
      WIFI_SSID:
        description: 'WiFi 名称'
        required: false
        type: string
        default: 'OpenWrt'
      
      WIFI_PASSWORD:
        description: 'WiFi 密码'
        required: false
        type: string
        default: '12345678'
      
      # 仅输出配置
      TEST_MODE:
        description: '仅输出配置，不编译固件'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # 解析插件配置
  parse-config:
    runs-on: ubuntu-latest
    outputs:
      plugin-list: ${{ steps.parse.outputs.plugin-list }}
      plugin-versions: ${{ steps.parse.outputs.plugin-versions }}
      config-file: ${{ steps.parse.outputs.config-file }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Parse Plugin Configuration
        id: parse
        run: |
          # 解析插件列表
          PROXY_LIST="${{ inputs.PROXY_PLUGIN }}"
          STORAGE_LIST="${{ inputs.STORAGE_PLUGIN }}"
          NETWORK_LIST="${{ inputs.NETWORK_TOOL }}"
          OTHER_LIST="${{ inputs.OTHER_PLUGIN }}"
          
          # 合并所有插件
          ALL_PLUGINS=""
          if [ -n "$PROXY_LIST" ]; then
            ALL_PLUGINS="$PROXY_LIST"
          fi
          if [ -n "$STORAGE_LIST" ]; then
            if [ -n "$ALL_PLUGINS" ]; then
              ALL_PLUGINS="$ALL_PLUGINS,$STORAGE_LIST"
            else
              ALL_PLUGINS="$STORAGE_LIST"
            fi
          fi
          if [ -n "$NETWORK_LIST" ]; then
            if [ -n "$ALL_PLUGINS" ]; then
              ALL_PLUGINS="$ALL_PLUGINS,$NETWORK_LIST"
            else
              ALL_PLUGINS="$NETWORK_LIST"
            fi
          fi
          if [ -n "$OTHER_LIST" ]; then
            if [ -n "$ALL_PLUGINS" ]; then
              ALL_PLUGINS="$ALL_PLUGINS,$OTHER_LIST"
            else
              ALL_PLUGINS="$OTHER_LIST"
            fi
          fi
          
          echo "plugin-list=$ALL_PLUGINS" >> $GITHUB_OUTPUT
          echo "plugin-versions=${{ inputs.PROXY_VERSION }}" >> $GITHUB_OUTPUT
          echo "config-file=${{ inputs.TARGET_PLATFORM }}" >> $GITHUB_OUTPUT
          
          echo "插件列表：$ALL_PLUGINS"
          echo "插件版本：${{ inputs.PROXY_VERSION }}"
          echo "配置文件：${{ inputs.TARGET_PLATFORM }}"

  # 自定义编译
  custom-build:
    needs: parse-config
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Projects
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev jq
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Clone OpenWRT Source
        run: |
          echo "源码：${{ inputs.WRT_SOURCE }}"
          echo "分支：${{ inputs.WRT_BRANCH }}"
          
          # 检查 VIKINGYFY 源码推荐分支
          if [[ "${{ inputs.WRT_SOURCE }}" == "VIKINGYFY/immortalwrt" && "${{ inputs.WRT_BRANCH }}" == "main" ]]; then
            echo "⚠️  警告：VIKINGYFY/immortalwrt 推荐使用 'owrt' 分支以获得完整中文支持"
            echo "ℹ️  当前使用 'main' 分支，中文语言包可能不完整"
          fi
          
          git clone --depth=1 --single-branch --branch ${{ inputs.WRT_BRANCH }} \
            https://github.com/${{ inputs.WRT_SOURCE }}.git ./wrt/
          
          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

      - name: Add Chinese language configuration files
        run: |
          echo "添加中文语言配置文件..."
          cd ./wrt/
          
          # 复制自定义文件到 OpenWRT 文件系统
          if [ -d "$GITHUB_WORKSPACE/files" ]; then
            echo "复制自定义文件..."
            cp -rf $GITHUB_WORKSPACE/files/* ./files/
            
            # 确保脚本可执行
            if [ -f "./files/etc/uci-defaults/99-set-chinese-language" ]; then
              chmod +x ./files/etc/uci-defaults/99-set-chinese-language
              echo "已设置中文语言配置脚本"
            fi
          else
            echo "⚠️ 自定义文件目录不存在，跳过"
          fi
          
          echo "✅ 中文配置文件添加完成"

      - name: Update Feeds
        run: |
          cd ./wrt/
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Check available Chinese language packages
        run: |
          cd ./wrt/
          echo "🔍 检查可用的中文语言包..."
          echo ""
          echo "搜索 luci-i18n 包..."
          find ./feeds -name "Makefile" -type f | xargs grep -l "luci-i18n" | head -10 | while read file; do
            PKG_NAME=$(grep -o "PKG_NAME:=.*" "$file" | cut -d: -f2 | tr -d ' ')
            echo "找到包: $PKG_NAME"
          done || true
          
          echo ""
          echo "搜索中文语言包 (zh-cn, zh_Hans)..."
          find ./feeds -name "Makefile" -type f | xargs grep -i "zh-cn\|zh_Hans" 2>/dev/null | head -20 | while read line; do
            echo "$line"
          done || echo "未找到中文语言包信息"
          
          echo ""
          echo "列出 feeds/luci 中的语言包..."
          ls -la ./feeds/luci/ 2>/dev/null || echo "feeds/luci 目录不存在"
          
          echo "✅ 语言包检查完成"

      - name: Install Custom Plugins
        env:
          PLUGIN_LIST: ${{ needs.parse-config.outputs.plugin-list }}
          PLUGIN_VERSIONS: ${{ needs.parse-config.outputs.plugin-versions }}
        run: |
          cd ./wrt/package/
          
          # 确保 .config 文件存在且可写
          echo "检查 .config 文件..."
          if [ ! -f ../.config ]; then
              touch ../.config
              echo "# 自动生成的临时配置文件" > ../.config
              echo "创建了 .config 文件"
          else
              echo ".config 文件已存在"
          fi
          
          # 检查插件仓库映射文件
          echo "检查插件仓库映射文件..."
          REPO_MAP="$GITHUB_WORKSPACE/plugin-repos.json"
          if [ ! -f "$REPO_MAP" ]; then
              echo "❌ 插件仓库映射文件不存在: $REPO_MAP"
              exit 1
          fi
          
          # 解析插件列表
          if [ -n "$PLUGIN_LIST" ]; then
            IFS=',' read -ra PLUGINS <<< "$PLUGIN_LIST"
            
            for PLUGIN in "${PLUGINS[@]}"; do
              echo "=== 处理插件: $PLUGIN ==="
              
              # 清理插件名称（移除可能的 luci-app- 前缀）
              CLEAN_PLUGIN=$(echo "$PLUGIN" | sed -e 's/^luci-app-//' -e 's/^luci-//')
              
              # 从映射文件获取仓库地址
              REPO_URL=$(jq -r --arg pkg "$PLUGIN" '.[$pkg]' "$REPO_MAP" 2>/dev/null || echo "")
              
              if [ -z "$REPO_URL" ] || [ "$REPO_URL" = "null" ]; then
                echo "⚠️  插件 $PLUGIN 没有仓库映射，尝试通用克隆..."
                
                # 确定配置选项名称（确保有 luci-app- 前缀）
                if [[ "$PLUGIN" =~ ^luci-app- ]]; then
                  CONFIG_NAME="$PLUGIN"
                elif [[ "$PLUGIN" =~ ^luci- ]]; then
                  CONFIG_NAME="app-${PLUGIN}"
                else
                  CONFIG_NAME="luci-app-${PLUGIN}"
                fi
                
                # 尝试通用仓库模式（使用清理后的名称）
                GENERIC_PATTERNS=$(jq -r '.generic_patterns[]' "$REPO_MAP" 2>/dev/null)
                CLONED=false
                
                for pattern in $GENERIC_PATTERNS; do
                  REPO_URL=$(echo "$pattern" | sed "s/{plugin}/$CLEAN_PLUGIN/g")
                  echo "尝试通用地址: $REPO_URL"
                  
                  if git clone --depth=1 "$REPO_URL" 2>/dev/null; then
                    echo "✅ 通用克隆成功: $PLUGIN"
                    CLONED=true
                    break
                  fi
                done
                
                if [ "$CLONED" = false ]; then
                  echo "⚠️  无法克隆插件 ${PLUGIN}，尝试直接添加配置"
                  echo "CONFIG_PACKAGE_${CONFIG_NAME}=y" >> ../.config
                fi
              else
                echo "仓库地址: $REPO_URL"
                
                # 特殊处理 samba4（可能在 feeds 中已存在）
                if [[ "$PLUGIN" =~ samba4 ]]; then
                  echo "CONFIG_PACKAGE_${PLUGIN}=y" >> ../.config
                  git clone --depth=1 "$REPO_URL" 2>/dev/null || echo "samba4 仓库可能不存在，依赖 feeds 中的 samba4"
                else
                  # 克隆仓库
                  if git clone --depth=1 "$REPO_URL"; then
                    echo "✅ 克隆成功: $PLUGIN"
                  else
                    echo "❌ 克隆失败: $PLUGIN"
                    echo "CONFIG_PACKAGE_${PLUGIN}=y" >> ../.config
                  fi
                fi
              fi
              
              echo ""
            done
          else
            echo "⚠️  没有插件需要安装"
          fi
          
          # 安装主题
          THEME="${{ inputs.THEME }}"
          if [ -n "$THEME" ]; then
            echo "=== 安装主题: $THEME ==="
            
            # 从映射文件获取主题仓库地址
            THEME_PKG="luci-theme-${THEME}"
            THEME_REPO=$(jq -r --arg pkg "$THEME_PKG" '.[$pkg]' "$REPO_MAP" 2>/dev/null || echo "")
            
            if [ -z "$THEME_REPO" ] || [ "$THEME_REPO" = "null" ]; then
              echo "⚠️  无法获取主题 $THEME 的仓库地址，使用默认地址"
              case "$THEME" in
                "argon")
                  git clone --depth=1 https://github.com/sbwml/luci-theme-argon.git
                  ;;
                "aurora")
                  git clone --depth=1 https://github.com/eamonxg/luci-theme-aurora.git
                  ;;
                "kucat")
                  git clone --depth=1 https://github.com/sirpdboy/luci-app-kucat.git 2>/dev/null || git clone --depth=1 https://github.com/sirpdboy/luci-theme-kucat.git
                  ;;
                *)
                  echo "⚠️  未知主题: $THEME"
                  ;;
              esac
            else
              echo "主题仓库地址: $THEME_REPO"
              git clone --depth=1 "$THEME_REPO" || echo "主题克隆失败"
            fi
          fi

      - name: Generate Configuration
        run: |
          cd ./wrt/
          
          # 设置主题变量
          THEME="${{ inputs.THEME }}"
          
          # 使用基础配置
          cat $GITHUB_WORKSPACE/Config/${{ needs.parse-config.outputs.config-file }}.txt > .config
          cat $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          
          # 添加用户自定义配置
          echo "# 自定义插件配置" >> .config
          
          # 启用已安装的插件
          for DIR in ./package/*/; do
            if [ -d "$DIR" ]; then
              PLUGIN_NAME=$(basename $DIR)
              echo "CONFIG_PACKAGE_${PLUGIN_NAME}=y" >> .config
              echo "启用插件：${PLUGIN_NAME}"
            fi
          done
          
          make defconfig -j$(nproc)
          
          echo ""
          echo "🔧 配置中文语言支持..."
          
          # 智能检测并添加中文语言包
          echo "搜索可用的中文语言包..."
          
          # 方法1：检查 feeds 中是否存在 luci-i18n-base-zh-cn
          ZH_CN_PACKAGE_FOUND=false
          ZH_HANS_PACKAGE_FOUND=false
          
          # 搜索 base 语言包（最基础的）
          if find ./feeds -name "Makefile" -type f -exec grep -l "PKG_NAME:=luci-i18n-base-zh-cn" {} \; 2>/dev/null | grep -q .; then
            echo "✅ 发现 luci-i18n-base-zh-cn 语言包"
            ZH_CN_PACKAGE_FOUND=true
            echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
          else
            echo "⚠️  未找到 luci-i18n-base-zh-cn"
          fi
          
          # 搜索 zh_Hans 变体
          if find ./feeds -name "Makefile" -type f -exec grep -l "PKG_NAME:=luci-i18n-base-zh_Hans" {} \; 2>/dev/null | grep -q .; then
            echo "✅ 发现 luci-i18n-base-zh_Hans 语言包"
            ZH_HANS_PACKAGE_FOUND=true
            echo "CONFIG_PACKAGE_luci-i18n-base-zh_Hans=y" >> .config
          else
            echo "⚠️  未找到 luci-i18n-base-zh_Hans"
          fi
          
          # 如果都没有找到，尝试搜索其他基础语言包变体
          if [ "$ZH_CN_PACKAGE_FOUND" = false ] && [ "$ZH_HANS_PACKAGE_FOUND" = false ]; then
            echo "搜索其他中文语言包变体..."
            OTHER_ZH_PACKAGE=$(find ./feeds -name "Makefile" -type f -exec grep -l "zh-cn\|zh_Hans\|zh_CN" {} \; 2>/dev/null | head -1 | xargs grep -o "PKG_NAME:=luci-i18n-[^ ]*" 2>/dev/null | head -1 | cut -d: -f2 || echo "")
            
            if [ -n "$OTHER_ZH_PACKAGE" ]; then
              echo "✅ 发现可用的中文语言包: $OTHER_ZH_PACKAGE"
              echo "CONFIG_PACKAGE_${OTHER_ZH_PACKAGE}=y" >> .config
            else
              echo "❌ 未找到任何中文语言包，界面将显示英文"
              echo "# 警告：未找到中文语言包，界面将显示英文" >> .config
              
              # 强制尝试添加基础中文语言包配置（可能无效，但尝试）
              echo "CONFIG_PACKAGE_luci-i18n-base-zh_Hans=y" >> .config
              echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y" >> .config
              echo "⚠️  已强制添加中文语言包配置，实际效果依赖 feeds 是否存在"
            fi
          fi
          
          # 设置默认语言配置
          echo "CONFIG_DEFAULT_luci-theme-${THEME:-argon}=y" >> .config
          echo "CONFIG_DEFAULT_luci-lang=zh_cn" >> .config
          
          # 关键：编译时包含中文语言包 (VIKINGYFY 配置)
          echo "CONFIG_LUCI_LANG_zh_Hans=y" >> .config
          
          # 主题关联配置
          echo "CONFIG_PACKAGE_luci-app-${THEME:-argon}-config=y" >> .config
          
          # 记录语言包状态
          if [ "$ZH_CN_PACKAGE_FOUND" = true ] || [ "$ZH_HANS_PACKAGE_FOUND" = true ]; then
            echo "✅ 中文语言包已配置"
          else
            echo "⚠️  未配置中文语言包，界面可能显示英文"
            echo "# 未找到中文语言包，依赖预配置文件和首次启动脚本" >> .config
          fi
          
          echo "✅ 中文语言配置已完成"

      - name: Show Configuration
        run: |
          echo "======================================"
          echo "编译配置信息"
          echo "======================================"
          echo "源码：${{ inputs.WRT_SOURCE }}"
          echo "分支：${{ inputs.WRT_BRANCH }}"
          echo "平台：${{ inputs.TARGET_PLATFORM }}"
          echo "主题：${{ inputs.THEME }}"
          echo "插件列表：${{ needs.parse-config.outputs.plugin-list }}"
          echo "插件版本：${{ needs.parse-config.outputs.plugin-versions }}"
          echo "======================================"
          
          # 显示配置摘要
          echo ""
          echo "📦 已启用的主要插件:"
          grep "CONFIG_PACKAGE_luci-app-" ./wrt/.config | grep "=y" | sort
          
          echo ""
          echo "🔍 插件配置详细状态:"
          echo "总数: $(grep "CONFIG_PACKAGE_luci-app-" ./wrt/.config | grep "=y" | wc -l) 个插件"
          echo "被禁用的插件:"
          grep "CONFIG_PACKAGE_luci-app-" ./wrt/.config | grep "=n" | sort | head -10
          
          echo ""
          echo "🌐 语言包配置状态:"
          echo "中文语言包:"
          grep -E "CONFIG_PACKAGE_luci-i18n.*(zh-cn|zh_Hans)" ./wrt/.config | grep "=y" | sort || echo "未找到中文语言包配置"
          
          echo ""
          echo "📋 完整配置中的语言相关设置:"
          grep -i "lang\|locale\|language\|i18n" ./wrt/.config | head -15 || true



      - name: Download Packages
        if: inputs.TEST_MODE == false
        run: |
          cd ./wrt/
          make download -j$(nproc) V=s

      - name: Fix hostapd compile error (after download)
        if: inputs.TEST_MODE == false
        run: |
          echo "======================================"
          echo "🔧 修复 hostapd 编译错误 (下载后修复)"
          echo "======================================"
          echo "错误信息: 'struct hostapd_config' has no member named 'he_mu_edca'"
          echo "修复方法: 添加条件编译守卫 #ifdef CONFIG_IEEE80211AX"
          echo "======================================"
          
          cd ./wrt/
          
          # 方法1: 查找并直接修改 hostapd.c (现在应该已经下载)
          echo ""
          echo "🔍 查找 hostapd.c 文件..."
          # 在 build_dir 中查找最新的 hostapd 目录
          HOSTAPD_DIR=$(find ./build_dir -type d -name "hostapd-*" -o -name "hostapd-wpad-*" | grep -v ".backup" | head -1)
          if [ -n "$HOSTAPD_DIR" ]; then
            echo "找到 hostapd 目录: $HOSTAPD_DIR"
            HOSTAPD_FOUND=$(find "$HOSTAPD_DIR" -name "hostapd.c" -type f | head -1)
          else
            # 备用查找路径
            HOSTAPD_FOUND=$(find . -type f -name "hostapd.c" -path "*/hostapd-*" -o -path "*/hostapd-wpad-*" | grep -v ".backup" | head -1)
          fi
          
          if [ -n "$HOSTAPD_FOUND" ] && [ -f "$HOSTAPD_FOUND" ]; then
            echo "✅ 找到文件: $HOSTAPD_FOUND"
            echo "📝 备份原文件..."
            BACKUP_PATH="${HOSTAPD_FOUND}.backup.$(date +%s)"
            cp "$HOSTAPD_FOUND" "$BACKUP_PATH"
            echo "备份保存到: $BACKUP_PATH"
            
            echo "🔧 应用条件编译修复..."
            # 修复具体的错误行: hapd->iface->conf->he_mu_edca.he_qos_info &= 0xfff0;
            sed -i 's/\(hapd->iface->conf->he_mu_edca\.he_qos_info &=\s*0xfff0;\)/#ifdef CONFIG_IEEE80211AX\n\1\n#endif/' "$HOSTAPD_FOUND"
            
            # 检查修复是否成功
            if grep -q "#ifdef CONFIG_IEEE80211AX" "$HOSTAPD_FOUND"; then
              echo "✅ 条件编译守卫已添加"
              echo "修改预览:"
              grep -n -B2 -A2 "he_mu_edca" "$HOSTAPD_FOUND" | head -10
            else
              echo "⚠️  未找到需要修复的行，可能文件结构不同"
            fi
          else
            echo "⚠️  未找到 hostapd.c 文件，使用配置修复"
          fi
          
          # 方法2: 在配置中启用 802.11ax（确保编译通过）
          echo ""
          echo "⚙️  更新编译配置..."
          if [ -f ".config" ]; then
            # 检查是否已存在 CONFIG_IEEE80211AX 配置
            if ! grep -q "CONFIG_IEEE80211AX" .config; then
              echo "CONFIG_IEEE80211AX=y" >> .config
              echo "✅ 已添加: CONFIG_IEEE80211AX=y"
            elif grep -q "CONFIG_IEEE80211AX=$" .config; then
              # 如果是空的，改为启用
              sed -i 's/CONFIG_IEEE80211AX=$/CONFIG_IEEE80211AX=y/' .config
              echo "✅ 已修改: CONFIG_IEEE80211AX=$ → CONFIG_IEEE80211AX=y"
            else
              echo "📋 CONFIG_IEEE80211AX 已配置，无需修改"
            fi
            
            # 显示相关配置
            echo ""
            echo "📊 相关 WiFi 配置状态:"
            grep -E "CONFIG_IEEE80211(AX|AC|BE|N)" .config || true
          else
            echo "⚠️  配置文件 .config 不存在"
          fi
          
          echo ""
          echo "======================================"
          echo "✅ 修复步骤完成，继续编译..."
          echo "======================================"

      - name: Compile Firmware
        if: inputs.TEST_MODE == false
        run: |
          cd ./wrt/
          make -j$(nproc) IGNORE_ERRORS=1 BUILD_LOG=1 || make -j1 V=s

      - name: Package Firmware
        if: inputs.TEST_MODE == false
        run: |
          # 设置环境变量用于发布标签
          echo "TAG_NAME=Custom-Build-${{ inputs.TARGET_PLATFORM }}-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          
          cd ./wrt/ && mkdir ./upload/
          
          # 保存配置
          cp -f ./.config ./upload/Custom-Config-${{ inputs.TARGET_PLATFORM }}-$(date +%Y%m%d-%H%M).txt
          
          # 重命名固件
          for FILE in $(find ./bin/targets/ -type f -iname "*.bin" -o -iname "*.img.gz"); do
            cp -f $FILE ./upload/
          done
          
          # 生成校验和
          cd ./upload/
          sha256sum *.* > SHA256SUMS.txt
          md5sum *.* > MD5SUMS.txt
          
          # 生成固件信息
          cat > FIRMWARE_INFO.md << EOF
          # 自定义编译固件信息
          
          **编译时间**: $(date '+%Y-%m-%d %H:%M:%S')
          **源码**: ${{ inputs.WRT_SOURCE }}
          **分支**: ${{ inputs.TARGET_PLATFORM }}
          **平台**: ${{ inputs.TARGET_PLATFORM }}
          **主题**: ${{ inputs.THEME }}
          
          ## 插件列表
          
          ${{ needs.parse-config.outputs.plugin-list }}
          
          ## 校验和
          
          详见 SHA256SUMS.txt 和 MD5SUMS.txt
          EOF

      - name: Upload Firmware
        if: inputs.TEST_MODE == false
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: ./wrt/upload/*.*
          body_path: ./wrt/upload/FIRMWARE_INFO.md
          generate_release_notes: true

      - name: Upload Configuration (Test Mode)
        if: inputs.TEST_MODE == true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Custom-Config-${{ inputs.TARGET_PLATFORM }}-$(date +%Y%m%d-%H%M)
          files: ./wrt/.config
          body: |
            ## 自定义配置文件
            
            **生成时间**: $(date '+%Y-%m-%d %H:%M:%S')
            **源码**: ${{ inputs.WRT_SOURCE }}
            **平台**: ${{ inputs.TARGET_PLATFORM }}
            
            此配置文件可用于手动编译。
