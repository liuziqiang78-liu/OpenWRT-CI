name: Custom Build

on:
  # 手动触发 - 可定制配置
  workflow_dispatch:
    inputs:
      # OpenWRT 源码选择
      WRT_SOURCE:
        description: 'OpenWRT 源码'
        required: true
        type: choice
        options:
          - immortalwrt/immortalwrt
          - VIKINGYFY/immortalwrt
          - LiBwrt/openwrt-6.x
          - qosmio/openwrt-ipq
        default: 'VIKINGYFY/immortalwrt'
      
      # 源码分支
      WRT_BRANCH:
        description: '源码分支 (LiBwrt 选择 main-nss 或 25.12-nss)'
        required: true
        type: choice
        options:
          - main
          - owrt
          - main-nss
          - 25.12-nss
        default: 'main'
      
      # 目标平台
      TARGET_PLATFORM:
        description: '目标平台'
        required: true
        type: choice
        options:
          - MEDIATEK
          - ROCKCHIP
          - X86
          - IPQ50XX
          - IPQ60XX
          - IPQ807X
        default: 'MEDIATEK'

      # 目标设备
      TARGET_DEVICE:
        description: '目标设备 (留空编译全部，填写设备名如 jdcloud_re-cs-02 则只编译该设备)'
        required: false
        type: string
        default: ''
        placeholder: 'jdcloud_re-cs-02'
      
      # 科学上网插件
      PROXY_PLUGIN:
        description: '科学上网插件 (可多选，用逗号分隔)'
        required: false
        type: string
        placeholder: 'homeproxy,openclash,passwall'
      
      # 科学上网插件版本
      PROXY_VERSION:
        description: '科学上网插件版本 (留空使用最新)'
        required: false
        type: string
        placeholder: 'v1.9.5,v0.45.87,v2.8.3'
      
      # 存储插件
      STORAGE_PLUGIN:
        description: '存储插件 (可多选，用逗号分隔)'
        required: false
        type: string
        placeholder: 'diskman,samba4,aria2,qbittorrent'
      
      # 网络工具
      NETWORK_TOOL:
        description: '网络工具 (可多选，用逗号分隔)'
        required: false
        type: string
        placeholder: 'tailscale,ddns-go,easytier,vnt'
      
      # 主题
      THEME:
        description: 'UI 主题'
        required: false
        type: choice
        options:
          - argon
          - aurora
          - kucat
          - alpha
          - design
          - material3
          - openwrt-2020
          - openwrt
          - none
        default: 'argon'
      
      # 其他插件
      OTHER_PLUGIN:
        description: '其他插件 (用逗号分隔)'
        required: false
        type: string
      
      # 防火墙类型: 强制使用纯 iptables (硬编码在编译步骤中)
      
      # 路由器配置
      LAN_IP:
        description: '路由器默认 IP'
        required: false
        type: string
        default: '192.168.1.1'
      
      LOGIN_USERNAME:
        description: '登录用户名'
        required: false
        type: string
        default: 'root'
      
      LOGIN_PASSWORD:
        description: '登录密码'
        required: false
        type: string
        default: ''
      
      WIFI_SSID:
        description: 'WiFi 名称'
        required: false
        type: string
        default: 'OpenWrt'
      
      WIFI_PASSWORD:
        description: 'WiFi 密码'
        required: false
        type: string
        default: '12345678'
      
      # NSS 固件版本 (仅 LiBwrt/qosmio 源码)
      NSS_FIRMWARE_VERSION:
        description: 'NSS 固件版本 (仅 LiBwrt/qosmio 源码，auto=智能选择)'
        required: false
        type: choice
        options:
          - auto
          - 11_4
          - 12_2
          - 12_5
        default: 'auto'

      # 仅输出配置
      TEST_MODE:
        description: '仅输出配置，不编译固件'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

concurrency:
  group: build-${{ github.event.inputs.TARGET_PLATFORM }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  # 解析插件配置
  parse-config:
    runs-on: ubuntu-latest
    outputs:
      plugin-list: ${{ steps.parse.outputs.plugin-list }}
      plugin-versions: ${{ steps.parse.outputs.plugin-versions }}
      config-file: ${{ steps.parse.outputs.config-file }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Parse Plugin Configuration
        id: parse
        run: |
          # 解析插件列表
          PROXY_LIST="${{ inputs.PROXY_PLUGIN }}"
          STORAGE_LIST="${{ inputs.STORAGE_PLUGIN }}"
          NETWORK_LIST="${{ inputs.NETWORK_TOOL }}"
          OTHER_LIST="${{ inputs.OTHER_PLUGIN }}"
          
          # 合并所有插件
          ALL_PLUGINS=""
          if [ -n "$PROXY_LIST" ]; then
            ALL_PLUGINS="$PROXY_LIST"
          fi
          if [ -n "$STORAGE_LIST" ]; then
            if [ -n "$ALL_PLUGINS" ]; then
              ALL_PLUGINS="$ALL_PLUGINS,$STORAGE_LIST"
            else
              ALL_PLUGINS="$STORAGE_LIST"
            fi
          fi
          if [ -n "$NETWORK_LIST" ]; then
            if [ -n "$ALL_PLUGINS" ]; then
              ALL_PLUGINS="$ALL_PLUGINS,$NETWORK_LIST"
            else
              ALL_PLUGINS="$NETWORK_LIST"
            fi
          fi
          if [ -n "$OTHER_LIST" ]; then
            if [ -n "$ALL_PLUGINS" ]; then
              ALL_PLUGINS="$ALL_PLUGINS,$OTHER_LIST"
            else
              ALL_PLUGINS="$OTHER_LIST"
            fi
          fi
          
          echo "plugin-list=$ALL_PLUGINS" >> $GITHUB_OUTPUT
          echo "plugin-versions=${{ inputs.PROXY_VERSION }}" >> $GITHUB_OUTPUT
          echo "config-file=${{ inputs.TARGET_PLATFORM }}" >> $GITHUB_OUTPUT
          
          echo "插件列表：$ALL_PLUGINS"
          echo "插件版本：${{ inputs.PROXY_VERSION }}"
          echo "配置文件：${{ inputs.TARGET_PLATFORM }}"

  # 自定义编译
  custom-build:
    needs: parse-config
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Projects
        uses: actions/checkout@v4

      - name: Initialization Environment
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E apt -yqq purge firefox
          sudo -E apt -yqq update
          sudo -E apt -yqq full-upgrade
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E apt -yqq install dos2unix python3-netifaces libfuse-dev jq
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E systemctl daemon-reload
          sudo -E timedatectl set-timezone "Asia/Shanghai"

          sudo mkdir -p /mnt/build_wrt
          sudo chown $USER:$USER /mnt/build_wrt
          sudo ln -s /mnt/build_wrt $GITHUB_WORKSPACE/wrt

      - name: Clone OpenWRT Source
        run: |
          echo "源码：${{ inputs.WRT_SOURCE }}"
          echo "分支：${{ inputs.WRT_BRANCH }}"
          
          # 检查 VIKINGYFY 源码推荐分支
          if [[ "${{ inputs.WRT_SOURCE }}" == "VIKINGYFY/immortalwrt" && "${{ inputs.WRT_BRANCH }}" == "main" ]]; then
            echo "⚠️  警告：VIKINGYFY/immortalwrt 推荐使用 'owrt' 分支以获得完整中文支持"
            echo "ℹ️  当前使用 'main' 分支，中文语言包可能不完整"
          fi

          # 检查 LiBwrt 源码分支有效性
          if [[ "${{ inputs.WRT_SOURCE }}" == "LiBwrt/openwrt-6.x" ]]; then
            if [[ "${{ inputs.WRT_BRANCH }}" == "main" || "${{ inputs.WRT_BRANCH }}" == "owrt" ]]; then
              echo "❌  错误：LiBwrt/openwrt-6.x 没有 '${{ inputs.WRT_BRANCH }}' 分支"
              echo "ℹ️  可用分支：main-nss (主线NSS) / 25.12-nss (稳定版NSS)"
              exit 1
            fi
            echo "✅  LiBwrt 源码分支：${{ inputs.WRT_BRANCH }}"
          fi
          
          git clone --depth=1 --single-branch --branch ${{ inputs.WRT_BRANCH }} \
            https://github.com/${{ inputs.WRT_SOURCE }}.git ./wrt/
          
          cd ./wrt/ && echo "WRT_HASH=$(git log -1 --pretty=format:'%h')" >> $GITHUB_ENV

      # ========== 缓存系统 (工具链 + ccache + 下载包) ==========
      - name: Restore Toolchain Cache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            ./wrt/.ccache
            ./wrt/staging_dir/host
            ./wrt/staging_dir/tool
          key: openwrt-toolchain-${{ inputs.TARGET_PLATFORM }}-${{ inputs.WRT_SOURCE }}-${{ env.WRT_HASH }}
          restore-keys: |
            openwrt-toolchain-${{ inputs.TARGET_PLATFORM }}-${{ inputs.WRT_SOURCE }}-
            openwrt-toolchain-${{ inputs.TARGET_PLATFORM }}-

      - name: Restore Download Cache
        uses: actions/cache@v4
        with:
          path: ./wrt/dl
          key: openwrt-dl-${{ inputs.TARGET_PLATFORM }}-${{ hashFiles('Config/*.txt') }}
          restore-keys: |
            openwrt-dl-${{ inputs.TARGET_PLATFORM }}-

      - name: Update Toolchain Timestamps
        if: steps.cache-toolchain.outputs.cache-hit == 'true'
        run: |
          if [ -d "./wrt/staging_dir" ]; then
            echo "✅ 命中工具链缓存，跳过工具链编译"
            # 更新时间戳欺骗构建系统
            find ./wrt/staging_dir -type d -name "stamp" -not -path "*target*" 2>/dev/null | while read -r DIR; do
              find "$DIR" -type f -exec touch {} + 2>/dev/null
            done
            mkdir -p ./wrt/tmp && echo "1" > ./wrt/tmp/.build
            echo "🔧 工具链缓存已恢复，编译将大幅加速"
          else
            echo "⚠️  无缓存，首次编译需完整构建工具链"
          fi

      - name: Add Chinese language configuration files
        run: |
          echo "添加中文语言配置文件..."
          cd ./wrt/
          
          # 复制自定义文件到 OpenWRT 文件系统
          if [ -d "$GITHUB_WORKSPACE/files" ]; then
            echo "复制自定义文件..."
            cp -rf $GITHUB_WORKSPACE/files/* ./files/
            
            # 确保脚本可执行
            if [ -f "./files/etc/uci-defaults/99-set-chinese-language" ]; then
              chmod +x ./files/etc/uci-defaults/99-set-chinese-language
              echo "已设置中文语言配置脚本"
            fi
          else
            echo "⚠️ 自定义文件目录不存在，跳过"
          fi
          
          echo "✅ 中文配置文件添加完成"

      - name: Update Feeds
        run: |
          cd ./wrt/
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Install Custom Plugins
        env:
          PLUGIN_LIST: ${{ needs.parse-config.outputs.plugin-list }}
          THEME: ${{ inputs.THEME }}
        run: |
          # 确保 .config 文件存在
          cd ./wrt/
          if [ ! -f .config ]; then
              echo "# 自动生成的临时配置文件" > .config
          fi
          
          chmod +x $GITHUB_WORKSPACE/scripts/install-plugins.sh
          
          echo "=========================================="
          echo "📦 从 plugins/ 目录安装插件"
          echo "=========================================="
          
          # 合并插件列表 (用户选的 + 主题)
          ALL_PLUGINS="$PLUGIN_LIST"
          if [ -n "$THEME" ]; then
            THEME_PKG="luci-theme-${THEME}"
            if [ -n "$ALL_PLUGINS" ]; then
              ALL_PLUGINS="$ALL_PLUGINS,$THEME_PKG"
            else
              ALL_PLUGINS="$THEME_PKG"
            fi
          fi
          
          if [ -n "$ALL_PLUGINS" ]; then
            # 用 install-plugins.sh 安装每个插件
            IFS=',' read -ra PLUGINS <<< "$ALL_PLUGINS"
            SUCCESS=0
            FAILED=0
            
            for PLUGIN in "${PLUGINS[@]}"; do
              # 跳过空项
              [ -z "$PLUGIN" ] && continue
              
              # 检查 plugins/ 目录是否有该插件
              PLUGIN_DIR="$GITHUB_WORKSPACE/plugins/$PLUGIN"
              if [ -d "$PLUGIN_DIR" ] && [ -f "$PLUGIN_DIR/config.json" ]; then
                REPO=$(jq -r '.repository' "$PLUGIN_DIR/config.json")
                NAME=$(jq -r '.name' "$PLUGIN_DIR/config.json")
                
                echo ""
                echo "=== [$NAME] $PLUGIN ==="
                echo "  来源: plugins/ 目录"
                echo "  仓库: $REPO"
                
                # 克隆到 package/ (仓库为空表示已在 feeds 中)
                if [ -z "$REPO" ] || [ "$REPO" = "null" ]; then
                  # 检查是否标记为不可用
                  NOTE=$(jq -r '.note // ""' "$PLUGIN_DIR/config.json" 2>/dev/null)
                  if echo "$NOTE" | grep -q "不可用"; then
                    echo "  🚫 仓库为空且标记不可用，跳过"
                    FAILED=$((FAILED + 1))
                  else
                    echo "  ℹ️  仓库为空，使用 feeds 中的版本"
                    SUCCESS=$((SUCCESS + 1))
                  fi
                elif [ ! -d "./package/$PLUGIN" ]; then
                  if git clone --depth=1 "$REPO" "./package/$PLUGIN" 2>/dev/null; then
                    echo "  ✅ 克隆成功"
                    SUCCESS=$((SUCCESS + 1))
                  else
                    echo "  ❌ 克隆失败，跳过此插件"
                    FAILED=$((FAILED + 1))
                    # 不写入配置，避免 make defconfig 找不到包
                    continue
                  fi
                else
                  echo "  ⚠️  已存在，跳过"
                  SUCCESS=$((SUCCESS + 1))
                fi
                
                # 写入配置
                if [ -f "$PLUGIN_DIR/config.mk" ]; then
                  cat "$PLUGIN_DIR/config.mk" >> .config
                  echo "  ✅ 配置已写入"
                fi
              else
                # 回退: 插件不在 plugins/ 目录，用 plugin-repos.json
                echo ""
                echo "=== [未知] $PLUGIN ==="
                echo "  ⚠️  plugins/ 目录无此插件，尝试 plugin-repos.json..."
                
                REPO_MAP="$GITHUB_WORKSPACE/plugin-repos.json"
                REPO_URL=$(jq -r --arg pkg "$PLUGIN" '.[$pkg]' "$REPO_MAP" 2>/dev/null || echo "")
                
                if [ -n "$REPO_URL" ] && [ "$REPO_URL" != "null" ]; then
                  if git clone --depth=1 "$REPO_URL" "./package/$PLUGIN" 2>/dev/null; then
                    echo "  ✅ 回退克隆成功"
                    echo "CONFIG_PACKAGE_${PLUGIN}=y" >> .config
                    SUCCESS=$((SUCCESS + 1))
                  else
                    echo "  ❌ 回退克隆失败，跳过"
                    FAILED=$((FAILED + 1))
                    continue
                  fi
                else
                  echo "  ⚠️  无仓库映射，仅写入配置"
                  echo "CONFIG_PACKAGE_${PLUGIN}=y" >> .config
                fi
              fi
            done
            
            echo ""
            echo "=========================================="
            echo "📊 插件安装完成: 成功 $SUCCESS, 失败 $FAILED"
            echo "=========================================="
          else
            echo "⚠️  没有选择任何插件"
          fi

      - name: Download athena-led binary (RE-CS-02 only)
        if: inputs.TARGET_DEVICE == 'jdcloud_re-cs-02'
        run: |
          cd ./wrt/
          echo "📥 下载 athena-led 二进制 (京东云 RE-CS-02 专属)..."
          ATHENA_URL=$(curl -sL https://api.github.com/repos/sagan/athena-led/releases/latest | jq -r '.assets[] | select(.name | test("linux-arm64|linux.*arm64|aarch64")) | .browser_download_url' | head -1)
          if [ -z "$ATHENA_URL" ]; then
            # 回退: 尝试 arm 版本
            ATHENA_URL=$(curl -sL https://api.github.com/repos/sagan/athena-led/releases/latest | jq -r '.assets[] | select(.name | test("linux-arm")) | .browser_download_url' | head -1)
          fi
          if [ -n "$ATHENA_URL" ]; then
            mkdir -p ./files/usr/sbin
            curl -sL "$ATHENA_URL" -o /tmp/athena-led.zip 2>/dev/null || curl -sL "$ATHENA_URL" -o ./files/usr/sbin/athena-led
            if file /tmp/athena-led.zip 2>/dev/null | grep -q "Zip"; then
              unzip -o /tmp/athena-led.zip -d /tmp/athena-led-extract/
              cp /tmp/athena-led-extract/athena-led* ./files/usr/sbin/athena-led
            fi
            chmod +x ./files/usr/sbin/athena-led
            echo "✅ athena-led 已安装到 /usr/sbin/athena-led"
          else
            echo "❌ 未找到 athena-led 预编译二进制"
          fi

      - name: Generate Configuration
        env:
          WRT_CONFIG: ${{ inputs.TARGET_PLATFORM }}
          WRT_THEME: ${{ inputs.THEME }}
          WRT_SSID: ${{ inputs.WIFI_SSID }}
          WRT_WORD: ${{ inputs.WIFI_PASSWORD }}
          WRT_IP: ${{ inputs.LAN_IP }}
          WRT_NAME: ${{ inputs.LOGIN_USERNAME }}
          WRT_PW: ${{ inputs.LOGIN_PASSWORD }}
          WRT_TARGET: ${{ inputs.TARGET_PLATFORM }}
        run: |
          cd ./wrt/
          
          # 使用基础配置
          CONFIG_FILE="$GITHUB_WORKSPACE/Config/${WRT_CONFIG}.txt"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "❌ 配置文件不存在: $CONFIG_FILE"
            exit 1
          fi
          
          cat "$CONFIG_FILE" > .config
          cat $GITHUB_WORKSPACE/Config/GENERAL.txt >> .config
          
          # ========== 加载设备独立配置 ==========
          DEVICE_NAME="${{ inputs.TARGET_DEVICE }}"
          DEVICE_DIR="$GITHUB_WORKSPACE/Config/device/${DEVICE_NAME}"

          if [ -n "$DEVICE_NAME" ]; then
            # 优先读取新目录结构 Config/device/<id>/device.conf
            if [ -d "$DEVICE_DIR" ] && [ -f "$DEVICE_DIR/device.conf" ]; then
              echo ""
              echo "🎯 加载设备配置: $DEVICE_NAME"
              cat "$DEVICE_DIR/device.conf" >> .config
              echo "✅ 设备配置已加载: $DEVICE_DIR/device.conf"

              # 加载设备专属插件
              if [ -f "$DEVICE_DIR/plugins.txt" ]; then
                DEVICE_PLUGINS=$(grep "^CONFIG_PACKAGE_" "$DEVICE_DIR/plugins.txt" 2>/dev/null | grep -v "^#" || true)
                if [ -n "$DEVICE_PLUGINS" ]; then
                  echo ""
                  echo "📦 加载设备专属插件: $DEVICE_NAME"
                  echo "$DEVICE_PLUGINS" >> .config
                  echo "$DEVICE_PLUGINS" | while read -r line; do
                    echo "  ✅ $line"
                  done
                  echo "✅ 设备专属插件已加载"
                fi
              fi

            # 兼容旧结构 Config/device/<id>.txt
            elif [ -f "$GITHUB_WORKSPACE/Config/device/${DEVICE_NAME}.txt" ]; then
              echo ""
              echo "🎯 加载设备配置 (旧格式): $DEVICE_NAME"
              cat "$GITHUB_WORKSPACE/Config/device/${DEVICE_NAME}.txt" >> .config
              echo "✅ 设备配置已加载"
            else
              echo "❌ 设备配置不存在: $DEVICE_NAME"
              echo "可用设备:"
              ls -d $GITHUB_WORKSPACE/Config/device/*/ 2>/dev/null | xargs -I{} basename {} | tr '\n' ' '
              exit 1
            fi
          else
            echo "⚠️  未指定设备，将编译该平台所有设备"
            # 未指定设备时，仅加载当前平台的设备配置
            PLATFORM_LOWER="${WRT_CONFIG,,}"
            LOADED=0
            for DEV_CONF in $GITHUB_WORKSPACE/Config/device/*/device.conf; do
              [ -f "$DEV_CONF" ] || continue
              # 检查设备配置是否属于当前平台
              if grep -q "CONFIG_TARGET_DEVICE_${PLATFORM_LOWER}\|CONFIG_TARGET_DEVICE_qualcommax_ipq\|CONFIG_TARGET_DEVICE_mediatek\|CONFIG_TARGET_DEVICE_rockchip\|CONFIG_TARGET_x86" "$DEV_CONF" 2>/dev/null; then
                # 进一步验证平台子目标匹配
                DEV_MATCH=false
                case "$PLATFORM_LOWER" in
                  ipq60xx)
                    grep -q "qualcommax_ipq60xx" "$DEV_CONF" && DEV_MATCH=true
                    ;;
                  ipq807x)
                    grep -q "qualcommax_ipq807x" "$DEV_CONF" && DEV_MATCH=true
                    ;;
                  ipq50xx)
                    grep -q "qualcommax_ipq50xx" "$DEV_CONF" && DEV_MATCH=true
                    ;;
                  mediatek)
                    grep -q "mediatek_filogic" "$DEV_CONF" && DEV_MATCH=true
                    ;;
                  rockchip)
                    grep -q "rockchip_armv8" "$DEV_CONF" && DEV_MATCH=true
                    ;;
                  x86)
                    grep -q "x86" "$DEV_CONF" && DEV_MATCH=true
                    ;;
                esac
                if [ "$DEV_MATCH" = true ]; then
                  cat "$DEV_CONF" >> .config
                  LOADED=$((LOADED + 1))
                fi
              fi
            done
            echo "✅ 已加载 $LOADED 个 ${WRT_CONFIG} 平台设备配置"
          fi
          
          # 添加用户自定义配置
          echo "# 自定义插件配置" >> .config
          
          # 启用已安装的插件
          for DIR in ./package/*/; do
            if [ -d "$DIR" ]; then
              PLUGIN_NAME=$(basename $DIR)
              echo "CONFIG_PACKAGE_${PLUGIN_NAME}=y" >> .config
              echo "启用插件：${PLUGIN_NAME}"
            fi
          done
          
          # ========== WiFi 配置 (修复 WiFi 不生效问题) ==========
          echo ""
          echo "🔧 配置 WiFi 设置..."
          
          WIFI_SH=$(find ./target/linux/ -path "*/base-files/etc/uci-defaults/*set-wireless.sh" -type f 2>/dev/null | head -1)
          WIFI_UC="./package/network/config/wifi-scripts/files/lib/wifi/mac80211.uc"
          
          if [ -f "$WIFI_SH" ]; then
            echo "✅ 找到 WiFi 配置脚本: $WIFI_SH"
            # 修改 WiFi 名称
            sed -i "s/BASE_SSID='.*'/BASE_SSID='${WRT_SSID}'/g" "$WIFI_SH"
            # 修改 WiFi 密码
            sed -i "s/BASE_WORD='.*'/BASE_WORD='${WRT_WORD}'/g" "$WIFI_SH"
            echo "✅ WiFi SSID: ${WRT_SSID}"
            echo "✅ WiFi 密码已设置"
          elif [ -f "$WIFI_UC" ]; then
            echo "✅ 找到 WiFi UC 配置: $WIFI_UC"
            # 修改 WiFi 名称
            sed -i "s/ssid='.*'/ssid='${WRT_SSID}'/g" "$WIFI_UC"
            # 修改 WiFi 密码
            sed -i "s/key='.*'/key='${WRT_WORD}'/g" "$WIFI_UC"
            # 修改 WiFi 地区
            sed -i "s/country='.*'/country='CN'/g" "$WIFI_UC"
            # 修改 WiFi 加密
            sed -i "s/encryption='.*'/encryption='psk2+ccmp'/g" "$WIFI_UC"
            echo "✅ WiFi SSID: ${WRT_SSID}"
            echo "✅ WiFi 密码已设置"
          else
            echo "⚠️  未找到 WiFi 配置文件，尝试 uci-defaults 方式"
            # 创建 uci-defaults 脚本设置 WiFi
            mkdir -p ./files/etc/uci-defaults
            cat > ./files/etc/uci-defaults/99-setup-wifi << 'WIFIEOF'
          #!/bin/sh
          # 设置 WiFi
          for iface in $(uci show wireless | grep "ssid=" | cut -d. -f2 | sort -u); do
            uci set wireless.${iface}.ssid='WIFI_SSID_PLACEHOLDER'
            uci set wireless.${iface}.encryption='psk2+ccmp'
            uci set wireless.${iface}.key='WIFI_KEY_PLACEHOLDER'
            uci set wireless.${iface}.disabled='0'
          done
          uci commit wireless
          WIFIEOF
            # 替换占位符
            sed -i "s/WIFI_SSID_PLACEHOLDER/${WRT_SSID}/g" ./files/etc/uci-defaults/99-setup-wifi
            sed -i "s/WIFI_KEY_PLACEHOLDER/${WRT_WORD}/g" ./files/etc/uci-defaults/99-setup-wifi
            chmod +x ./files/etc/uci-defaults/99-setup-wifi
            echo "✅ 已创建 WiFi 初始化脚本"
          fi
          
          # ========== 源码专用设置调度 ==========
          echo ""
          echo "=========================================="
          echo "📋 执行源码设置调度器: ${{ inputs.WRT_SOURCE }}"
          echo "=========================================="

          export WRT_SOURCE="${{ inputs.WRT_SOURCE }}"
          export WRT_CONFIG="${{ inputs.TARGET_PLATFORM }}"
          export WRT_TARGET="${{ inputs.TARGET_PLATFORM }}"
          export WRT_THEME="${{ inputs.THEME }}"
          export WRT_SSID="${{ inputs.WIFI_SSID }}"
          export WRT_WORD="${{ inputs.WIFI_PASSWORD }}"
          export WRT_IP="${{ inputs.LAN_IP }}"
          export WRT_NAME="${{ inputs.LOGIN_USERNAME }}"
          export WRT_PW="${{ inputs.LOGIN_PASSWORD }}"
          export WRT_FIREWALL="iptables"
          export NSS_FIRMWARE_VERSION="${{ inputs.NSS_FIRMWARE_VERSION }}"

          chmod +x $GITHUB_WORKSPACE/Scripts/sources/apply-settings.sh
          source $GITHUB_WORKSPACE/Scripts/sources/apply-settings.sh

          # ========== ccache ==========
          echo "CONFIG_CCACHE=y" >> .config
          echo "CCACHE_DIR=$(pwd)/.ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV

          # ========== make defconfig ==========
          echo "🔧 运行 make defconfig..."
          make defconfig 2>&1 || {
            echo "⚠️ make defconfig 出现错误，尝试详细输出..."
            make defconfig V=s 2>&1 || true
          }

          # ========== 防冲突检查 ==========
          if grep -q '^CONFIG_PACKAGE_odhcpd=y' .config && grep -q '^CONFIG_PACKAGE_odhcpd-ipv6only=y' .config; then
            sed -i 's/^CONFIG_PACKAGE_odhcpd-ipv6only=y/# CONFIG_PACKAGE_odhcpd-ipv6only is not set/' .config
            echo "✅ 已修复 odhcpd 冲突"
          fi

      - name: Show Configuration
        run: |
          echo "======================================"
          echo "编译配置信息"
          echo "======================================"
          echo "源码：${{ inputs.WRT_SOURCE }}"
          echo "分支：${{ inputs.WRT_BRANCH }}"
          echo "平台：${{ inputs.TARGET_PLATFORM }}"
          echo "设备：${{ inputs.TARGET_DEVICE || '全部设备' }}"
          echo "主题：${{ inputs.THEME }}"
          echo "WiFi SSID：${{ inputs.WIFI_SSID }}"
          echo "插件列表：${{ needs.parse-config.outputs.plugin-list }}"
          echo "======================================"
          
          echo ""
          echo "📦 已启用的主要插件:"
          grep "CONFIG_PACKAGE_luci-app-" ./wrt/.config | grep "=y" | sort
          
          echo ""
          echo "📡 WiFi 相关配置:"
          grep -i "wifi\|hostapd\|wpad\|ath11k\|mt76\|mac80211" ./wrt/.config | grep "=y" | sort || echo "无"
          
          echo ""
          echo "📋 完整配置中的语言相关设置:"
          grep -i "lang\|locale\|language\|i18n" ./wrt/.config | head -15 || true

      - name: Download Packages
        if: inputs.TEST_MODE == false
        run: |
          cd ./wrt/
          make download -j$(nproc) V=s

      - name: Fix hostapd compile error (after download)
        if: inputs.TEST_MODE == false
        run: |
          echo "🔧 修复 hostapd 编译错误..."
          
          cd ./wrt/
          
          # 查找 hostapd.c
          HOSTAPD_DIR=$(find ./build_dir -type d -name "hostapd-*" -o -name "hostapd-wpad-*" | grep -v ".backup" | head -1)
          if [ -n "$HOSTAPD_DIR" ]; then
            HOSTAPD_FOUND=$(find "$HOSTAPD_DIR" -name "hostapd.c" -type f | head -1)
          else
            HOSTAPD_FOUND=$(find . -type f -name "hostapd.c" -path "*/hostapd-*" -o -path "*/hostapd-wpad-*" | grep -v ".backup" | head -1)
          fi
          
          if [ -n "$HOSTAPD_FOUND" ] && [ -f "$HOSTAPD_FOUND" ]; then
            echo "✅ 找到 hostapd.c: $HOSTAPD_FOUND"
            cp "$HOSTAPD_FOUND" "${HOSTAPD_FOUND}.backup"
            sed -i 's/\(hapd->iface->conf->he_mu_edca\.he_qos_info &=\s*0xfff0;\)/#ifdef CONFIG_IEEE80211AX\n\1\n#endif/' "$HOSTAPD_FOUND"
            echo "✅ hostapd 修复完成"
          fi
          
          # 确保 CONFIG_IEEE80211AX 启用
          if [ -f ".config" ] && ! grep -q "CONFIG_IEEE80211AX=y" .config; then
            echo "CONFIG_IEEE80211AX=y" >> .config
          fi

      - name: Compile Firmware
        if: inputs.TEST_MODE == false
        run: |
          cd ./wrt/
          make -j$(nproc) IGNORE_ERRORS=1 BUILD_LOG=1 || make -j1 V=s

      - name: Package Firmware
        if: inputs.TEST_MODE == false
        run: |
          DEVICE_TAG="${{ inputs.TARGET_DEVICE }}"
          if [ -n "$DEVICE_TAG" ]; then
            echo "TAG_NAME=Custom-Build-${{ inputs.TARGET_PLATFORM }}-${DEVICE_TAG}-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          else
            echo "TAG_NAME=Custom-Build-${{ inputs.TARGET_PLATFORM }}-$(date +%Y%m%d-%H%M)" >> $GITHUB_ENV
          fi
          
          cd ./wrt/ && mkdir ./upload/
          
          # 保存配置
          cp -f ./.config ./upload/Custom-Config-${{ inputs.TARGET_PLATFORM }}-$(date +%Y%m%d-%H%M).txt
          
          # 复制固件
          for FILE in $(find ./bin/targets/ -type f -iname "*.bin" -o -iname "*.img.gz"); do
            cp -f $FILE ./upload/
          done
          
          # 生成校验和
          cd ./upload/
          sha256sum *.* > SHA256SUMS.txt
          md5sum *.* > MD5SUMS.txt
          
          cat > FIRMWARE_INFO.md << EOF
          # 自定义编译固件信息
          
          **编译时间**: $(date '+%Y-%m-%d %H:%M:%S')
          **源码**: ${{ inputs.WRT_SOURCE }}
          **平台**: ${{ inputs.TARGET_PLATFORM }}
          **设备**: ${{ inputs.TARGET_DEVICE || '全部设备' }}
          **主题**: ${{ inputs.THEME }}
          
          ## 登录信息
          
          | 项目 | 值 |
          |------|-----|
          | IP 地址 | ${{ inputs.LAN_IP }} |
          | 用户名 | ${{ inputs.LOGIN_USERNAME }} |
          | 密码 | ${{ inputs.LOGIN_PASSWORD }} |
          | WiFi 名称 | ${{ inputs.WIFI_SSID }} |
          | WiFi 密码 | ${{ inputs.WIFI_PASSWORD }} |
          
          ## 插件列表
          
          ${{ needs.parse-config.outputs.plugin-list }}
          
          ## 校验和
          
          详见 SHA256SUMS.txt 和 MD5SUMS.txt
          EOF

      - name: Upload Firmware
        if: inputs.TEST_MODE == false
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: ./wrt/upload/*.*
          body_path: ./wrt/upload/FIRMWARE_INFO.md
          generate_release_notes: true

      - name: Upload Configuration (Test Mode)
        if: inputs.TEST_MODE == true
        uses: softprops/action-gh-release@v1
        with:
          tag_name: Custom-Config-${{ inputs.TARGET_PLATFORM }}-$(date +%Y%m%d-%H%M)
          files: ./wrt/.config
          body: |
            ## 自定义配置文件
            **平台**: ${{ inputs.TARGET_PLATFORM }}
