name: Dependency Monitor

on:
  # 每天早上 8 点运行
  schedule:
    - cron: '0 0 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-dependencies:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install @octokit/rest
          npm install -g jq

      - name: Check Dependencies
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > check_deps.js << 'EOF'
          const { Octokit } = require('@octokit/rest');
          const fs = require('fs');

          const octokit = new Octokit({
            auth: process.env.GITHUB_TOKEN
          });

          const repos = {
            // 源码
            'immortalwrt-official': { repo: 'immortalwrt/immortalwrt', branch: 'owrt' },
            'immortalwrt-viking': { repo: 'VIKINGYFY/immortalwrt', branch: 'owrt' },
            
            // 代理
            'homeproxy': { repo: 'VIKINGYFY/homeproxy', branch: 'main' },
            'openclash': { repo: 'vernesong/OpenClash', branch: 'dev' },
            'passwall': { repo: 'Openwrt-Passwall/openwrt-passwall', branch: 'main' },
            'passwall2': { repo: 'Openwrt-Passwall/openwrt-passwall2', branch: 'main' },
            'nikki': { repo: 'nikkinikki-org/OpenWrt-nikki', branch: 'main' },
            'momo': { repo: 'nikkinikki-org/OpenWrt-momo', branch: 'main' },
            
            // 主题
            'argon': { repo: 'sbwml/luci-theme-argon', branch: 'openwrt-25.12' },
            'aurora': { repo: 'eamonxg/luci-theme-aurora', branch: 'master' },
            'aurora-config': { repo: 'eamonxg/luci-app-aurora-config', branch: 'master' },
            'kucat': { repo: 'sirpdboy/luci-theme-kucat', branch: 'master' },
            'kucat-config': { repo: 'sirpdboy/luci-app-kucat-config', branch: 'master' },
            
            // 网络工具
            'tailscale': { repo: 'Tokisaki-Galaxy/luci-app-tailscale-community', branch: 'master' },
            'ddns-go': { repo: 'sirpdboy/luci-app-ddns-go', branch: 'main' },
            'easytier': { repo: 'EasyTier/luci-app-easytier', branch: 'main' },
            'vnt': { repo: 'lmq8267/luci-app-vnt', branch: 'main' },
            'lucky': { repo: 'sirpdboy/luci-app-lucky', branch: 'main' },
            
            // 存储工具
            'diskman': { repo: 'lisaac/luci-app-diskman', branch: 'master' },
            'qbittorrent': { repo: 'sbwml/luci-app-qbittorrent', branch: 'master' },
            'openlist2': { repo: 'sbwml/luci-app-openlist2', branch: 'main' },
            'quickfile': { repo: 'sbwml/luci-app-quickfile', branch: 'main' },
            'partexp': { repo: 'sirpdboy/luci-app-partexp', branch: 'main' },
            
            // 系统工具
            'fancontrol': { repo: 'rockjake/luci-app-fancontrol', branch: 'main' },
            'mosdns': { repo: 'sbwml/luci-app-mosdns', branch: 'v5' },
            'netspeedtest': { repo: 'sirpdboy/luci-app-netspeedtest', branch: 'main' },
            'qmodem': { repo: 'FUjr/QModem', branch: 'main' },
            'viking': { repo: 'VIKINGYFY/packages', branch: 'main' },
            'gecoosac': { repo: 'laipeng668/luci-app-gecoosac', branch: 'main' },
            
            // U-Boot
            'uboot-emmc': { repo: 'chenxin527/uboot-ipq60xx-emmc-build', branch: 'main' },
            'uboot-nand': { repo: 'chenxin527/uboot-ipq60xx-nand-build', branch: 'main' },
            'uboot-nor': { repo: 'chenxin527/uboot-ipq60xx-nor-build', branch: 'main' }
          };

          async function checkRepo(name, config) {
            const [owner, repo] = config.repo.split('/');
            
            try {
              // 检查仓库
              const { data: repoData } = await octokit.repos.get({ owner, repo });
              
              // 检查分支
              const { data: branchData } = await octokit.repos.getBranch({ owner, repo, branch: config.branch });
              
              const lastCommit = new Date(branchData.commit.commit.author.date);
              const daysAgo = Math.floor((Date.now() - lastCommit.getTime()) / (1000 * 60 * 60 * 24));
              
              let status = '✅ HEALTHY';
              let statusText = '健康';
              if (repoData.archived) {
                status = '⚠️ ARCHIVED';
                statusText = '已归档';
              } else if (daysAgo > 365) {
                status = '⚠️ STALE';
                statusText = `超过 1 年未更新 (${daysAgo}天)`;
              } else if (daysAgo > 180) {
                status = '⚠️ OLD';
                statusText = `超过半年未更新 (${daysAgo}天)`;
              }
              
              return {
                name,
                repo: config.repo,
                branch: config.branch,
                status,
                statusText,
                stars: repoData.stargazers_count,
                forks: repoData.forks_count,
                lastCommit: branchData.commit.commit.author.date,
                daysAgo
              };
            } catch (error) {
              return {
                name,
                repo: config.repo,
                branch: config.branch,
                status: `❌ ERROR`,
                statusText: `错误：${error.message}`,
                stars: 'N/A',
                forks: 'N/A',
                lastCommit: 'N/A',
                daysAgo: -1
              };
            }
          }

          async function main() {
            const results = [];
            
            console.log('\n🔍 开始检查依赖仓库...\n');
            
            for (const [name, config] of Object.entries(repos)) {
              console.log(`📦 检查：${name} (${config.repo}@${config.branch})`);
              const result = await checkRepo(name, config);
              results.push(result);
              
              // 显示状态
              if (result.status === '✅ HEALTHY') {
                console.log(`   ✓ 状态：健康\n`);
              } else if (result.status.startsWith('⚠️')) {
                console.log(`   ⚠ 状态：${result.status}\n`);
              } else {
                console.log(`   ✗ 状态：${result.status}\n`);
              }
              
              // 避免 API 限流
              await new Promise(r => setTimeout(r, 500));
            }
            
            // 保存结果
            fs.writeFileSync('results.json', JSON.stringify(results, null, 2));
            
            // 生成 Markdown 报告
            const healthy = results.filter(r => r.status === '✅ HEALTHY').length;
            const warning = results.filter(r => r.status.startsWith('⚠️')).length;
            const critical = results.filter(r => r.status.startsWith('❌')).length;
            
            let md = `# OpenWRT-CI 依赖仓库健康检查报告\n\n`;
            md += `**生成时间**: ${new Date().toISOString().replace('T', ' ').substr(0, 19)}\n\n`;
            md += `## 统计\n\n`;
            md += `| 指标 | 数量 |\n|------|------|\n`;
            md += `| 总仓库数 | ${results.length} |\n`;
            md += `| 健康 | ${healthy} |\n`;
            md += `| 警告 | ${warning} |\n`;
            md += `| 严重 | ${critical} |\n\n`;
            md += `## 详细列表\n\n`;
            md += `| 名称 | 仓库 | 分支 | 状态 | Stars | Forks | 最后提交 |\n`;
            md += `|------|------|------|------|-------|-------|----------|\n`;
            
            for (const r of results) {
              md += `| ${r.name} | ${r.repo} | ${r.branch} | ${r.status} | ${r.stars} | ${r.forks} | ${r.lastCommit} |\n`;
            }
            
            fs.writeFileSync('report.md', md);
            
            // 输出摘要
            console.log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n');
            console.log('📊 检查完成！摘要如下：\n');
            console.log(`   总仓库数：${results.length}`);
            console.log(`   ✅ 健康：${healthy}`);
            console.log(`   ⚠️  警告：${warning}`);
            console.log(`   ❌ 严重：${critical}`);
            console.log('\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n');
            
            // 如果有严重问题，设置退出码
            if (critical > 0) {
              console.log('❌ 发现严重问题！请查看报告！\n');
              process.exit(1);
            } else if (warning > 0) {
              console.log('⚠️  发现警告信息，建议检查！\n');
            } else {
              console.log('✅ 所有依赖仓库状态正常！\n');
            }
          }

          main().catch(console.error);
          EOF
          
          node check_deps.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            results.json
            report.md

      - name: Create Issue if problems found
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: '⚠️ 依赖仓库检查发现严重问题'
          content-filepath: report.md
          labels: |
            dependencies
            automated
            priority-high
