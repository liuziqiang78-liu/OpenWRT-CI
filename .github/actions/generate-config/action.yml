name: 'Generate & Validate Config'
description: '调用 scripts/ 生成 .config 并验证，零 inline 逻辑'
inputs:
  target:
    description: 'Target 平台'
    required: true
  subtarget:
    description: 'Subtarget (留空=使用默认)'
    required: false
    default: ''
  profile:
    description: '设备型号 (空格分隔)'
    required: false
    default: ''
  firewall:
    description: '防火墙 (iptables/nftables)'
    required: true
    default: 'iptables'
  plugins:
    description: '额外插件 (空格分隔)'
    required: false
    default: ''
  root_password:
    description: 'Root 密码'
    required: false
    default: ''
  lan_ip:
    description: 'LAN IP 地址'
    required: false
    default: ''
  wifi_ssid:
    description: 'WiFi SSID'
    required: false
    default: ''
  wifi_password:
    description: 'WiFi 密码'
    required: false
    default: ''
  custom_config:
    description: '自定义 .config (base64)'
    required: false
    default: ''
  enable_ccache:
    description: '启用 ccache'
    required: false
    default: 'false'
  template:
    description: '模板级别 (base/full)'
    required: false
    default: 'base'
  working_dir:
    description: 'OpenWrt 源码目录'
    required: false
    default: 'openwrt'

runs:
  using: 'composite'
  steps:
    - name: ⚙️ Generate .config
      shell: bash
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_SUBTARGET: ${{ inputs.subtarget }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_FIREWALL: ${{ inputs.firewall }}
        INPUT_PLUGINS: ${{ inputs.plugins }}
        INPUT_ENABLE_CCACHE: ${{ inputs.enable_ccache }}
        INPUT_TEMPLATE: ${{ inputs.template }}
        INPUT_CUSTOM_CONFIG: ${{ inputs.custom_config }}
        INPUT_ROOT_PASSWORD: ${{ inputs.root_password }}
        INPUT_WIFI_PASSWORD: ${{ inputs.wifi_password }}
        REPO_WORKING_DIR: ${{ inputs.working_dir }}
      run: |
        # Mask sensitive values to prevent log leakage
        [ -n "$INPUT_ROOT_PASSWORD" ] && echo "::add-mask::$INPUT_ROOT_PASSWORD"
        [ -n "$INPUT_WIFI_PASSWORD" ] && echo "::add-mask::$INPUT_WIFI_PASSWORD"
        REPO_ROOT="$(cd "${{ github.workspace }}" && pwd)"
        cd "$REPO_WORKING_DIR"
        ARGS=(--target "$INPUT_TARGET" --firewall "$INPUT_FIREWALL" --config-dir "${REPO_ROOT}/config")
        [ -n "$INPUT_SUBTARGET" ] && ARGS+=(--subtarget "$INPUT_SUBTARGET")
        [ -n "$INPUT_PROFILE" ]   && ARGS+=(--profile "$INPUT_PROFILE")
        [ -n "$INPUT_PLUGINS" ]   && ARGS+=(--plugins "$INPUT_PLUGINS")
        [ "$INPUT_ENABLE_CCACHE" = "true" ] && ARGS+=(--enable-ccache)
        [ -n "$INPUT_TEMPLATE" ]      && ARGS+=(--template "$INPUT_TEMPLATE")
        [ -n "$INPUT_CUSTOM_CONFIG" ] && ARGS+=(--custom-config "$INPUT_CUSTOM_CONFIG")
        bash "${REPO_ROOT}/scripts/generate-config.sh" "${ARGS[@]}"

    - name: 🔧 Apply System Config
      shell: bash
      env:
        INPUT_ROOT_PASSWORD: ${{ inputs.root_password }}
        INPUT_LAN_IP: ${{ inputs.lan_ip }}
        INPUT_WIFI_SSID: ${{ inputs.wifi_ssid }}
        INPUT_WIFI_PASSWORD: ${{ inputs.wifi_password }}
        REPO_WORKING_DIR: ${{ inputs.working_dir }}
      run: |
        # Mask sensitive values to prevent log leakage
        [ -n "$INPUT_ROOT_PASSWORD" ] && echo "::add-mask::$INPUT_ROOT_PASSWORD"
        [ -n "$INPUT_WIFI_PASSWORD" ] && echo "::add-mask::$INPUT_WIFI_PASSWORD"
        [ -n "$INPUT_WIFI_SSID" ]    && echo "::add-mask::$INPUT_WIFI_SSID"
        REPO_ROOT="$(cd "${{ github.workspace }}" && pwd)"
        cd "$REPO_WORKING_DIR"
        ARGS=(--work-dir .)
        [ -n "$INPUT_ROOT_PASSWORD" ] && ARGS+=(--root-password "$INPUT_ROOT_PASSWORD")
        [ -n "$INPUT_LAN_IP" ]        && ARGS+=(--lan-ip "$INPUT_LAN_IP")
        [ -n "$INPUT_WIFI_SSID" ]     && ARGS+=(--wifi-ssid "$INPUT_WIFI_SSID")
        [ -n "$INPUT_WIFI_PASSWORD" ] && ARGS+=(--wifi-password "$INPUT_WIFI_PASSWORD")
        bash "${REPO_ROOT}/scripts/apply-system-config.sh" "${ARGS[@]}"

    - name: 🔍 Validate .config
      shell: bash
      env:
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_FIREWALL: ${{ inputs.firewall }}
      run: |
        REPO_ROOT="$(cd "${{ github.workspace }}" && pwd)"
        cd "${{ inputs.working_dir }}"
        # 传入完整的设备列表进行多设备验证
        bash "${REPO_ROOT}/scripts/validate-config.sh" \
          --config .config \
          --expected-device "$INPUT_PROFILE" \
          --expected-fw "$INPUT_FIREWALL"
