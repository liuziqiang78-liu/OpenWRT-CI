name: 'Generate & Validate OpenWrt Config'
description: '调用分层脚本生成 .config 并验证，支持任意平台/设备/防火墙组合'
inputs:
  target:
    description: 'Target 平台'
    required: true
  subtarget:
    description: 'Subtarget (留空=使用默认)'
    required: false
    default: ''
  profile:
    description: '设备型号 (空格分隔)'
    required: false
    default: ''
  firewall:
    description: '防火墙 (iptables/nftables)'
    required: true
    default: 'iptables'
  plugins:
    description: '额外插件 (空格分隔)'
    required: false
    default: ''
  root_password:
    description: 'Root 密码'
    required: false
    default: ''
  lan_ip:
    description: 'LAN IP 地址'
    required: false
    default: ''
  wifi_ssid:
    description: 'WiFi SSID'
    required: false
    default: ''
  wifi_password:
    description: 'WiFi 密码'
    required: false
    default: ''
  custom_config:
    description: '自定义 .config (base64)'
    required: false
    default: ''
  enable_ccache:
    description: '启用 ccache'
    required: false
    default: 'false'
  working_dir:
    description: 'OpenWrt 源码目录'
    required: false
    default: 'openwrt'

runs:
  using: 'composite'
  steps:
    # ── Layer 3: 配置生成 ──
    - name: ⚙️ Generate .config
      shell: bash
      run: |
        cd "${{ inputs.working_dir }}"
        REPO_ROOT="$(cd "${{ github.workspace }}" && pwd)"

        ARGS=(
          --target "${{ inputs.target }}"
          --firewall "${{ inputs.firewall }}"
          --config-dir "${REPO_ROOT}/config"
        )

        [ -n "${{ inputs.subtarget }}" ] && ARGS+=(--subtarget "${{ inputs.subtarget }}")
        [ -n "${{ inputs.profile }}" ]   && ARGS+=(--profile "${{ inputs.profile }}")
        [ -n "${{ inputs.plugins }}" ]   && ARGS+=(--plugins "${{ inputs.plugins }}")
        [ "${{ inputs.enable_ccache }}" = "true" ] && ARGS+=(--enable-ccache)
        [ -n "${{ inputs.custom_config }}" ] && ARGS+=(--custom-config "${{ inputs.custom_config }}")

        bash "${REPO_ROOT}/scripts/generate-config.sh" "${ARGS[@]}"

    # ── Layer 3.5: 应用系统配置 (密码/IP/WiFi) ──
    - name: 🔧 Apply System Config
      shell: bash
      run: |
        cd "${{ inputs.working_dir }}"

        # Root 密码
        ROOT_PW="${{ inputs.root_password }}"
        if [ -n "$ROOT_PW" ]; then
          echo "🔑 设置 Root 密码"
          mkdir -p files/etc
          HASHED_PW=$(python3 -c "import crypt; print(crypt.crypt('$ROOT_PW', crypt.mksalt(crypt.METHOD_SHA512)))" 2>/dev/null || \
                       openssl passwd -6 "$ROOT_PW" 2>/dev/null || echo "")
          if [ -n "$HASHED_PW" ]; then
            printf "root:%s:19797:0:99999:7:::\n" "$HASHED_PW" > files/etc/shadow
            chmod 600 files/etc/shadow
          else
            echo "::warning::密码加密失败，跳过"
          fi
        fi

        # LAN IP
        LAN_IP="${{ inputs.lan_ip }}"
        if [ -n "$LAN_IP" ] && [ "$LAN_IP" != "192.168.1.1" ]; then
          echo "🌐 设置 LAN IP: ${LAN_IP}"
          mkdir -p files/etc/uci-defaults
          printf '#!/bin/sh\nuci set network.lan.ipaddr="%s"\nuci commit network\n' "$LAN_IP" \
            > files/etc/uci-defaults/99-lan-ip
          chmod 755 files/etc/uci-defaults/99-lan-ip
        fi

        # WiFi
        WIFI_SSID="${{ inputs.wifi_ssid }}"
        WIFI_PW="${{ inputs.wifi_password }}"
        if [ -n "$WIFI_SSID" ]; then
          if [ -n "$WIFI_PW" ] && [ ${#WIFI_PW} -lt 8 ]; then
            echo "::error::WiFi 密码长度不足 8 位"
            exit 1
          fi
          echo "📶 设置 WiFi: ${WIFI_SSID}"
          mkdir -p files/etc/uci-defaults
          cat > files/etc/uci-defaults/99-wifi-setup <<WIFIEOF
          #!/bin/sh
          uci set wireless.@wifi-iface[0].ssid='${WIFI_SSID}'
          uci set wireless.@wifi-iface[0].encryption='psk2'
          uci set wireless.@wifi-iface[0].key='${WIFI_PW}'
          uci commit wireless
          WIFIEOF
          sed -i 's/^[[:space:]]*//' files/etc/uci-defaults/99-wifi-setup
          chmod 755 files/etc/uci-defaults/99-wifi-setup
        fi

    # ── Layer 4: 验证 ──
    - name: 🔍 Validate .config
      shell: bash
      run: |
        cd "${{ inputs.working_dir }}"
        REPO_ROOT="$(cd "${{ github.workspace }}" && pwd)"

        FIRST_DEVICE=$(echo "${{ inputs.profile }}" | awk '{print $1}')

        bash "${REPO_ROOT}/scripts/validate-config.sh" \
          --config .config \
          --expected-device "${FIRST_DEVICE}" \
          --expected-fw "${{ inputs.firewall }}"
