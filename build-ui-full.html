<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="theme-color" content="#667eea">
    <title>OpenWRT 自定义构建 - 完整插件版</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 10px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; text-align: center; }
        .header h1 { font-size: 1.8em; margin-bottom: 8px; line-height: 1.3; }
        .header p { font-size: 1em; opacity: 0.9; }
        .content { padding: 15px; }
        .section { margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; border-left: 4px solid #667eea; }
        .section h2 { color: #333; margin-bottom: 15px; font-size: 1.3em; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; font-size: 14px; }
        .form-group select, .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; -webkit-appearance: none; appearance: none; }
        .form-group select:focus, .form-group input:focus { outline: none; border-color: #667eea; }
        .plugin-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 5px; }
        .plugin-tabs::-webkit-scrollbar { display: none; }
        .plugin-tab { padding: 8px 16px; background: white; border: 2px solid #667eea; border-radius: 25px; cursor: pointer; transition: all 0.3s; white-space: nowrap; font-size: 14px; flex-shrink: 0; }
        .plugin-tab:active { transform: scale(0.95); }
        .plugin-tab.active { background: #667eea; color: white; }
        .plugin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
        .plugin-item { background: white; padding: 12px; border-radius: 8px; border: 2px solid #e0e0e0; cursor: pointer; transition: all 0.3s; position: relative; }
        .plugin-item:active { transform: scale(0.98); }
        .plugin-item.selected { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-color: #667eea; }
        .plugin-item input[type="checkbox"] { display: none; }
        .plugin-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
        .plugin-name { font-weight: 600; font-size: 14px; flex: 1; }
        .plugin-desc { font-size: 11px; color: #666; line-height: 1.3; margin-bottom: 8px; }
        .plugin-item.selected .plugin-desc { color: rgba(255,255,255,0.85); }
        .checkmark { width: 20px; height: 20px; border: 2px solid #e0e0e0; border-radius: 50%; background: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-left: 8px; }
        .plugin-item.selected .checkmark { background: #4CAF50; border-color: #4CAF50; color: white; }
        .checkmark::after { content: '✓'; font-size: 12px; font-weight: bold; display: none; }
        .plugin-item.selected .checkmark::after { display: block; }
        .plugin-expand { margin-top: 8px; padding-top: 8px; border-top: 1px solid #e0e0e0; display: none; }
        .plugin-item.expanded .plugin-expand { display: block; }
        .plugin-expand-title { font-size: 11px; color: #667eea; font-weight: 600; margin-bottom: 6px; }
        .plugin-expand-list { font-size: 10px; color: #666; line-height: 1.6; }
        .plugin-expand-list strong { color: #333; }
        .plugin-item.selected .plugin-expand-list { color: rgba(255,255,255,0.9); }
        .plugin-item.selected .plugin-expand-list strong { color: white; }
        .expand-indicator { font-size: 10px; color: #667eea; margin-top: 6px; text-align: center; }
        .plugin-item.expanded .expand-indicator::before { content: '收起 ▲'; }
        .plugin-item:not(.expanded) .expand-indicator::before { content: '展开 ▼'; }
        .plugin-item.selected .expand-indicator { color: rgba(255,255,255,0.9); }
        .search-box { margin-bottom: 15px; position: sticky; top: 0; background: #f8f9fa; padding: 10px 0; z-index: 100; }
        .search-box input { width: 100%; padding: 12px; border: 2px solid #667eea; border-radius: 25px; font-size: 16px; }
        .btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 30px; font-size: 16px; border-radius: 25px; cursor: pointer; width: 100%; margin-top: 20px; font-weight: 600; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .status-box { padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 14px; }
        .status-box.success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .status-box.error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
        .badge { display: inline-block; padding: 4px 10px; background: #667eea; color: white; border-radius: 15px; font-size: 12px; margin: 2px; }
        .plugin-count { background: #667eea; color: white; padding: 4px 10px; border-radius: 15px; font-size: 12px; margin-left: 8px; display: inline-block; }
        .select-all-bar { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .btn-small { padding: 6px 12px; font-size: 13px; border-radius: 20px; border: 2px solid #667eea; background: white; color: #667eea; cursor: pointer; flex-shrink: 0; }
        .btn-small:active { transform: scale(0.95); background: #667eea; color: white; }
        #category-count { font-size: 13px; color: #666; }
        
        /* 移动端优化 */
        @media (max-width: 768px) {
            body { padding: 5px; }
            .header { padding: 15px; }
            .header h1 { font-size: 1.5em; }
            .content { padding: 10px; }
            .section { padding: 12px; }
            .plugin-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .plugin-item { padding: 10px; }
            .plugin-name { font-size: 13px; }
            .plugin-desc { font-size: 10px; }
            .select-all-bar { justify-content: center; }
            #summary div { font-size: 13px; }
        }
        
        @media (max-width: 480px) {
            .header h1 { font-size: 1.3em; }
            .plugin-grid { grid-template-columns: 1fr; }
            .plugin-tab { font-size: 12px; padding: 6px 12px; }
            .btn { font-size: 15px; padding: 12px 20px; }
        }
        
        /* 横屏优化 */
        @media (max-height: 600px) and (orientation: landscape) {
            .header { padding: 10px; }
            .header h1 { font-size: 1.4em; }
            .content { padding: 10px; }
            .section { padding: 10px; margin-bottom: 15px; }
            .plugin-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 OpenWRT 自定义构建</h1>
            <p>支持 100+ 插件，来自 openwrt.ai</p>
        </div>
        
        <div class="content">
            <form id="buildForm">
                <!-- GitHub Token -->
                <div class="section">
                    <h2>🔑 GitHub Token 配置</h2>
                    <div class="form-group">
                        <label>Personal Access Token (PAT)</label>
                        <input type="password" id="github_token" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
                        <div style="margin-top: 10px; padding: 10px; background: #e8f5e9; border-radius: 6px;">
                            ✅ <strong>自动保存</strong>：输入 Token 后会自动保存
                        </div>
                    </div>
                </div>
                
                <!-- OpenWRT 源码 -->
                <div class="section">
                    <h2>OpenWRT 源码</h2>
                    <div class="form-group">
                        <label>源码仓库 *</label>
                        <select id="wrt_source" required>
                            <option value="VIKINGYFY/immortalwrt" selected>VIKINGYFY/immortalwrt (推荐)</option>
                            <option value="immortalwrt/immortalwrt">immortalwrt/immortalwrt (官方)</option>
                            <option value="LiBwrt/openwrt-6.x">LiBwrt/openwrt-6.x (6.x 内核)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>源码分支 *</label>
                        <select id="wrt_branch" required>
                            <option value="main" selected>main</option>
                            <option value="owrt">owrt</option>
                            <option value="master">master</option>
                        </select>
                    </div>
                </div>
                
                <!-- 目标平台 -->
                <div class="section">
                    <h2>目标平台</h2>
                    <div class="form-group">
                        <label>设备平台 *</label>
                        <select id="target_platform" required>
                            <option value="MEDIATEK" selected>MEDIATEK (联发科)</option>
                            <option value="ROCKCHIP">ROCKCHIP (瑞芯微)</option>
                            <option value="X86">X86 (PC/虚拟机)</option>
                            <option value="IPQ60XX-WIFI-YES">IPQ60XX (带 WiFi)</option>
                            <option value="IPQ60XX-WIFI-NO">IPQ60XX (无 WiFi)</option>
                        </select>
                    </div>
                </div>
                
                <!-- 插件选择 -->
                <div class="section">
                    <h2>📦 插件选择 <span class="plugin-count" id="total-count">已选 0 个</span></h2>
                    
                    <!-- 搜索框 -->
                    <div class="search-box">
                        <input type="text" id="plugin-search" placeholder="🔍 搜索插件..." oninput="filterPlugins()">
                    </div>
                    
                    <!-- 分类标签 -->
                    <div class="plugin-tabs">
                        <div class="plugin-tab active" onclick="switchTab('proxy')">🔐 科学上网 (12)</div>
                        <div class="plugin-tab" onclick="switchTab('storage')">💾 存储管理 (16)</div>
                        <div class="plugin-tab" onclick="switchTab('network')">🌐 网络工具 (35)</div>
                        <div class="plugin-tab" onclick="switchTab('theme')">🎨 主题 (13)</div>
                        <div class="plugin-tab" onclick="switchTab('system')">🔧 系统工具 (28)</div>
                    </div>
                    
                    <!-- 全选栏 -->
                    <div class="select-all-bar">
                        <button type="button" class="btn-small" onclick="selectAllCurrent()">全选当前分类</button>
                        <button type="button" class="btn-small" onclick="deselectAllCurrent()">取消全选</button>
                        <span id="category-count" style="color: #666;">已选 0 个</span>
                    </div>
                    
                    <!-- 插件网格 -->
                    <div id="plugin-grid" class="plugin-grid"></div>
                </div>
                
                <!-- 主题选择 -->
                <div class="section">
                    <h2>UI 主题</h2>
                    <div class="form-group">
                        <label>选择主题 *</label>
                        <select id="theme" required>
                            <option value="argon" selected>🎨 Argon (推荐)</option>
                            <option value="aurora">🌅 Aurora</option>
                            <option value="kucat">🐱 Kucat</option>
                            <option value="material">Material</option>
                            <option value="none">⚪ 默认主题</option>
                        </select>
                    </div>
                </div>
                
                <!-- 高级选项 -->
                <div class="section">
                    <h2>高级选项</h2>
                    <div class="form-group">
                        <label>其他插件 (用空格分隔包名)</label>
                        <input type="text" id="other_plugins" placeholder="例如：luci-app-vlmcsd automount btop">
                    </div>
                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="test_mode" style="width: auto;">
                            仅输出配置，不编译固件 (测试模式)
                        </label>
                    </div>
                </div>
                
                <!-- 配置摘要 -->
                <div class="section" id="summary">
                    <h3>📋 配置摘要</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div><strong>源码:</strong> <span id="summary-source">VIKINGYFY/immortalwrt</span></div>
                        <div><strong>平台:</strong> <span id="summary-platform">MEDIATEK</span></div>
                        <div><strong>主题:</strong> <span id="summary-theme">Argon</span></div>
                        <div><strong>已选插件:</strong> <span id="summary-plugins">0 个</span></div>
                    </div>
                </div>
                
                <button type="submit" class="btn" id="submitBtn">🚀 开始编译</button>
            </form>
        </div>
    </div>
    
    <script>
        // 完整插件数据库 (100+ 个)
        const PLUGINS = {
            proxy: [
                {name: 'HomeProxy', pkg: 'luci-app-homeproxy', desc: '高性能代理工具', features: '支持多种协议、高性能转发、规则分流、日志记录'},
                {name: 'OpenClash', pkg: 'luci-app-openclash', desc: 'Clash 客户端', features: '规则代理、节点切换、流量统计、订阅管理、Game 规则'},
                {name: 'PassWall', pkg: 'luci-app-passwall', desc: '综合代理工具', features: '多协议支持、自动切换、负载均衡、节点测试'},
                {name: 'PassWall2', pkg: 'luci-app-passwall2', desc: 'PassWall 新版', features: '新版架构、更好性能、更多协议、优化界面'},
                {name: 'SSR-Plus', pkg: 'luci-app-ssr-plus', desc: 'SS/SSR/Vmess 代理', features: 'SS/SSR/Vmess/Trojan、规则分流、KCP 加速'},
                {name: 'Nikki', pkg: 'luci-app-nikki', desc: 'Mihomo 透明代理', features: 'Transparent Proxy、高性能、规则分流'},
                {name: 'Momo', pkg: 'luci-app-momo', desc: '代理工具', features: '简洁界面、快速连接、自动更新'},
                {name: 'FullCombo Shark!', pkg: 'luci-app-fc', desc: '全能代理', features: '全能协议、一键配置、智能分流'},
                {name: 'luci-xray', pkg: 'luci-app-xray', desc: 'Xray 代理', features: 'Xray 核心、VLESS/Vmess、XTLS、Reality'},
                {name: 'NeKoBox', pkg: 'luci-app-nekobox', desc: 'NekoBox 客户端', features: 'Neko 核心、多协议、规则管理'},
                {name: 'v2rayA', pkg: 'luci-app-v2raya', desc: 'v2rayA 客户端', features: 'v2ray 核心、Web 管理、多用户支持'},
                {name: 'V2Ray Server', pkg: 'luci-app-v2ray-server', desc: 'V2Ray 服务器', features: 'V2Ray 核心、服务器管理、多协议支持'}
            ],
            storage: [
                {name: 'DiskMan', pkg: 'luci-app-diskman', desc: '磁盘管理', features: '分区管理、格式化、挂载、S.M.A.R.T 检测、RAID'},
                {name: 'Aria2', pkg: 'luci-app-aria2', desc: '下载工具', features: 'HTTP/FTP/BT 下载、多线程、远程控制器、Web 界面'},
                {name: 'Qbittorrent', pkg: 'luci-app-qbittorrent', desc: 'BT 下载', features: 'BT/磁力链、RSS 订阅、Web 控制、限速设置'},
                {name: 'Transmission', pkg: 'luci-app-transmission', desc: 'BT 下载', features: '轻量 BT、Web 界面、计划任务、自动做种'},
                {name: 'Samba4', pkg: 'luci-app-samba4', desc: '文件共享', features: 'SMB/CIFS 共享、权限管理、多用户访问'},
                {name: 'VSFTPD', pkg: 'luci-app-vsftpd', desc: 'FTP 服务器', features: 'FTP 服务、匿名访问、用户认证、带宽限制'},
                {name: 'FileBrowser', pkg: 'luci-app-filebrowser', desc: '文件管理', features: 'Web 文件管理、上传下载、在线预览、用户管理'},
                {name: 'WebDAV', pkg: 'luci-app-webdav', desc: 'WebDAV 服务', features: 'WebDAV 协议、远程访问、加密传输'},
                {name: 'Aliyundrive WebDAV', pkg: 'luci-app-aliyundrive-webdav', desc: '阿里云盘 WebDAV', features: '阿里云盘集成、Rust 实现、高性能、WebDAV 协议'},
                {name: 'Clouddrive2', pkg: 'luci-app-clouddrive2', desc: '多云盘管理', features: '支持 20+ 云盘、WebDAV、挂载本地、自动同步'},
                {name: 'Cloudreve', pkg: 'luci-app-cloudreve', desc: '私有云盘', features: '私有云存储、多用户、分享链接、在线预览'},
                {name: 'KodExplorer', pkg: 'luci-app-kodexplorer', desc: '可道云网盘', features: '在线办公、文件管理、协同编辑、权限控制'},
                {name: 'Linkease', pkg: 'luci-app-linkease', desc: '易有云', features: '文件管理、远程访问、数据备份'},
                {name: 'Rclone', pkg: 'luci-app-rclone', desc: '云盘同步', features: '支持 50+ 云盘、同步备份、加密传输、定时任务'},
                {name: 'MiniDLNA', pkg: 'luci-app-minidlna', desc: 'DLNA 媒体服务器', features: '媒体推送、智能电视播放、音乐流媒体'},
                {name: 'Alist', pkg: 'luci-app-alist', desc: '文件列表程序', features: '多存储支持、WebDAV、在线播放、文件管理'}
            ],
            network: [
                {name: 'Tailscale', pkg: 'luci-app-tailscale-community', desc: '虚拟组网', features: '异地组网、P2P 直连、加密传输、跨平台'},
                {name: 'ZeroTier', pkg: 'luci-app-zerotier', desc: '内网穿透', features: '虚拟局域网、跨网访问、免费节点、Moon 服务器'},
                {name: 'FRPC', pkg: 'luci-app-frpc', desc: '内网穿透客户端', features: 'FRP 客户端、HTTP/TCP/UDP 穿透、HTTPS 支持'},
                {name: 'FRPS', pkg: 'luci-app-frps', desc: 'FRP 服务端', features: 'FRP 服务端、多客户端管理、仪表盘'},
                {name: 'DDNS', pkg: 'luci-app-ddns', desc: '动态 DNS', features: '域名解析、自动更新、支持 20+ 服务商'},
                {name: 'DDNS-GO', pkg: 'luci-app-ddns-go', desc: '动态 DNS', features: '轻量 DDNS、支持阿里云/腾讯云/Cloudflare、Web 界面'},
                {name: 'MosDNS', pkg: 'luci-app-mosdns', desc: 'DNS 转发', features: 'DNS 分流、去广告、缓存加速、DoH/DoT 加密'},
                {name: 'SmartDNS', pkg: 'luci-app-smartdns', desc: '智能 DNS', features: '多上游 DNS、IP 优选、防污染、加速解析、自定义规则'},
                {name: 'Lucky', pkg: 'luci-app-lucky', desc: '多功能工具', features: '端口转发、DDNS、Web 服务、反向代理、IPv6 支持'},
                {name: 'OpenList2', pkg: 'luci-app-openlist2', desc: '文件列表', features: '原 Alist、多存储支持、在线播放、WebDAV'},
                {name: 'EasyTier', pkg: 'luci-app-easytier', desc: '异地组网', features: '去中心化组网、自动 NAT 穿透、低延迟'},
                {name: 'WireGuard', pkg: 'luci-app-wireguard', desc: 'VPN', features: 'WireGuard 协议、高性能、低延迟、移动端支持'},
                {name: 'OpenVPN', pkg: 'luci-app-openvpn-server-client', desc: 'OpenVPN', features: 'OpenVPN 服务端/客户端、SSL 加密、证书管理'},
                {name: 'QoS', pkg: 'luci-app-qosmate', desc: '流量控制', features: '带宽管理、优先级设置、实时监控、智能限速'},
                {name: 'SQM', pkg: 'luci-app-sqm-autorate', desc: 'QoS 控制', features: '智能队列管理、自动速率调整、降低延迟'},
                {name: 'Netdata', pkg: 'luci-app-netdata', desc: '性能监测', features: '实时性能监控、图表展示、告警通知、历史数据'},
                {name: 'FastNet', pkg: 'luci-app-fastnet', desc: '网络体检/测速', features: '网络诊断、速度测试、延迟检测、路由追踪'},
                {name: 'NLBWmon', pkg: 'luci-app-nlbwmon', desc: '流量统计', features: '按 IP 统计、历史数据、导出报表、实时监控'},
                {name: 'NPC', pkg: 'luci-app-npc', desc: 'NPS 客户端', features: 'NPS 内网穿透、多协议支持、加密传输'},
                {name: 'DDNSTO', pkg: 'luci-app-ddnsto', desc: '内网穿透', features: '免费内网穿透、HTTPS 访问、多线路'},
                {name: 'NATMap', pkg: 'luci-app-natmap', desc: '端口映射', features: '自动端口映射、UPnP、NAT-PMP、STUN'},
                {name: 'Socat', pkg: 'luci-app-socat', desc: '端口转发', features: 'TCP/UDP 转发、SSL 加密、多路复用'},
                {name: 'Thunder', pkg: 'luci-app-thunder', desc: '迅雷下载', features: '迅雷下载、远程下载、离线下载、云盘备份'},
                {name: 'BandiX', pkg: 'luci-app-bandix', desc: '流量监控限速', features: '实时流量、限速设置、设备管理、历史记录'},

                {name: 'ACME', pkg: 'luci-app-acme', desc: 'HTTPS 证书', features: '自动续签、多域名支持、Let\'s Encrypt'},

                {name: 'TVHelper', pkg: 'tvhelper', desc: '盒子助手', features: '直播源管理、EPG 节目单、电视助手'},
                {name: 'Store', pkg: 'luci-app-store', desc: 'iStore 补充', features: '应用商店、软件管理、扩展安装'},
                {name: 'UU Game Booster', pkg: 'luci-app-uugamebooster', desc: '网易 UU 加速器', features: '游戏加速、降低延迟、官方支持'},
                {name: 'OAF', pkg: 'luci-app-oaf', desc: '家长控制', features: '游戏/视频/应用过滤、时间控制、行为管理'},
                {name: 'iStore', pkg: 'luci-app-istore', desc: '应用商店', features: '插件管理、一键安装、固件集成'}
            ]
        };
        
        let currentTab = 'proxy';
        let selectedPlugins = {};
        
        // 初始化
        function init() {
            loadToken();
            renderPlugins('proxy');
        }
        
        // 渲染插件
        function renderPlugins(category) {
            const grid = document.getElementById('plugin-grid');
            grid.innerHTML = '';
            
            PLUGINS[category].forEach(plugin => {
                const isSelected = selectedPlugins[plugin.pkg];
                const item = document.createElement('div');
                item.className = 'plugin-item' + (isSelected ? ' selected' : '');
                item.dataset.pkg = plugin.pkg;
                
                item.innerHTML = `
                    <div class="plugin-header" onclick="event.stopPropagation(); togglePlugin('${plugin.pkg}', '${plugin.name}')">
                        <div class="plugin-name">${plugin.name}</div>
                        <div class="checkmark"></div>
                    </div>
                    <div class="plugin-desc">${plugin.desc}</div>
                    <div class="expand-indicator" onclick="event.stopPropagation(); toggleExpand('${plugin.pkg}')"></div>
                    <div class="plugin-expand">
                        <div class="plugin-expand-title">📦 包名：<strong>${plugin.pkg}</strong></div>
                        <div class="plugin-expand-list">
                            <strong>🔧 功能特性：</strong><br>
                            ${plugin.features}
                        </div>
                    </div>
                `;
                
                // 点击卡片展开/收起
                item.onclick = (e) => {
                    if (!e.target.closest('.expand-indicator')) {
                        togglePlugin(plugin.pkg, plugin.name);
                    }
                };
                
                grid.appendChild(item);
            });
            
            updateCounts();
        }
        
        // 展开/收起插件详情
        function toggleExpand(pkg) {
            const item = document.querySelector(`.plugin-item[data-pkg="${pkg}"]`);
            if (item) {
                item.classList.toggle('expanded');
            }
        }
        
        // 切换插件
        function togglePlugin(pkg, name) {
            if (selectedPlugins[pkg]) {
                delete selectedPlugins[pkg];
            } else {
                selectedPlugins[pkg] = name;
            }
            renderPlugins(currentTab);
            updateSummary();
        }
        
        // 切换标签
        function switchTab(category) {
            currentTab = category;
            document.querySelectorAll('.plugin-tab').forEach(tab => {
                tab.classList.toggle('active', tab.onclick.toString().includes(category));
            });
            renderPlugins(category);
        }
        
        // 全选当前分类
        function selectAllCurrent() {
            PLUGINS[currentTab].forEach(plugin => {
                selectedPlugins[plugin.pkg] = plugin.name;
            });
            renderPlugins(currentTab);
            updateSummary();
        }
        
        // 取消全选
        function deselectAllCurrent() {
            PLUGINS[currentTab].forEach(plugin => {
                delete selectedPlugins[plugin.pkg];
            });
            renderPlugins(currentTab);
            updateSummary();
        }
        
        // 更新计数
        function updateCounts() {
            const currentCount = PLUGINS[currentTab].filter(p => selectedPlugins[p.pkg]).length;
            const totalCount = Object.keys(selectedPlugins).length;
            
            document.getElementById('category-count').textContent = `已选 ${currentCount} 个`;
            document.getElementById('total-count').textContent = `已选 ${totalCount} 个`;
        }
        
        // 更新摘要
        function updateSummary() {
            const count = Object.keys(selectedPlugins).length;
            document.getElementById('summary-plugins').textContent = `${count} 个插件`;
        }
        
        // 搜索插件
        function filterPlugins() {
            const search = document.getElementById('plugin-search').value.toLowerCase();
            const items = document.querySelectorAll('.plugin-item');
            
            items.forEach(item => {
                const name = item.querySelector('.plugin-name').textContent.toLowerCase();
                const desc = item.querySelector('.plugin-desc').textContent.toLowerCase();
                item.style.display = (name.includes(search) || desc.includes(search)) ? 'block' : 'none';
            });
        }
        
        // Token 管理
        function loadToken() {
            const token = localStorage.getItem('github_token');
            if (token) {
                document.getElementById('github_token').value = token;
            }
        }
        
        function saveToken(token) {
            if (token) {
                localStorage.setItem('github_token', token);
            }
        }
        
        document.getElementById('github_token').addEventListener('input', function(e) {
            saveToken(e.target.value.trim());
        });
        
        // 表单提交
        document.getElementById('buildForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const token = document.getElementById('github_token').value.trim();
            
            if (!token) {
                alert('请先配置 GitHub Token！');
                return;
            }
            
            if (!validateForm()) {
                return;
            }
            
            saveToken(token);
            
            const confirmMsg = `
确认配置：

源码：${document.getElementById('wrt_source').value}
平台：${document.getElementById('target_platform').value}
主题：${document.getElementById('theme').value}

已选插件：${Object.keys(selectedPlugins).length} 个

是否开始编译？
            `;
            
            if (!confirm(confirmMsg)) {
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>正在触发编译...';
            
            const apiEndpoint = `https://api.github.com/repos/liuziqiang78-liu/OpenWRT-CI/actions/workflows/Custom-Build.yml/dispatches`;
            
            const requestBody = {
                ref: 'main',
                inputs: {
                    WRT_SOURCE: document.getElementById('wrt_source').value,
                    WRT_BRANCH: document.getElementById('wrt_branch').value,
                    TARGET_PLATFORM: document.getElementById('target_platform').value,
                    THEME: document.getElementById('theme').value,
                    PROXY_PLUGIN: Object.keys(selectedPlugins).filter(pkg => PLUGINS.proxy.find(p => p.pkg === pkg)).join(','),
                    STORAGE_PLUGIN: Object.keys(selectedPlugins).filter(pkg => PLUGINS.storage.find(p => p.pkg === pkg)).join(','),
                    NETWORK_TOOL: Object.keys(selectedPlugins).filter(pkg => PLUGINS.network.find(p => p.pkg === pkg)).join(','),
                    OTHER_PLUGIN: document.getElementById('other_plugins').value,
                    TEST_MODE: document.getElementById('test_mode').checked.toString()
                }
            };
            
            try {
                const response = await fetch(apiEndpoint, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestBody)
                });
                
                if (response.status === 401) throw new Error('Token 无效或已过期');
                if (response.status === 403) throw new Error('Token 权限不足');
                if (response.status === 404) throw new Error('工作流不存在');
                if (!response.ok) throw new Error(`GitHub API 错误：${response.status}`);
                
                submitBtn.innerHTML = '✅ 编译已触发！';
                window.open('https://github.com/liuziqiang78-liu/OpenWRT-CI/actions', '_blank');
                
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '🚀 开始编译';
                }, 3000);
                
            } catch (error) {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '🚀 开始编译';
                alert('❌ 触发失败：' + error.message);
            }
        });
        
        function validateForm() {
            const required = ['github_token', 'wrt_source', 'wrt_branch', 'target_platform', 'theme'];
            for (const id of required) {
                if (!document.getElementById(id).value) {
                    alert(`请填写必填项`);
                    return false;
                }
            }
            return true;
        }
        
        // 触摸优化
        document.addEventListener('touchstart', function() {}, {passive: true});
        
        // 防止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                e.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // 启动
        init();
    </script>
